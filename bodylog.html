                <span style={{fontSize:10,color:sel?"#1e293b":"#94a3b8",fontWeight:sel?700:400,lineHeight:1.2,textAlign:"center"}}>{label}</span>
              </button>
            );
          })}
        </div>
      </Card>

      {/* ─── AI解析 CTA（メモの下） ─── */}
      {authToken && !log.aiAnalysis && !log.aiTeaser && !homeAiLoading && (
        <button onClick={isPremium ? generateHomeAI : generateHomeTeaser}
          style={{display:"block",width:"100%",marginBottom:12,padding:"10px 0",borderRadius:12,
            border:"1.5px dashed #c7d2fe",background:"#f5f3ff",color:"#6366f1",
            fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
          ✨ AIでこの日を解析する
        </button>
      )}
      {authToken && homeAiLoading && (
        <div style={{textAlign:"center",color:"#6366f1",fontSize:13,padding:"12px 0",marginBottom:12}}>AI解析中...</div>
      )}

      {/* ティザーカード（無料ユーザー） */}
      {!isPremium && log.aiTeaser && !log.aiAnalysis && (
        <div style={{borderRadius:16,marginBottom:12,border:"1px solid #e0e7ff",overflow:"hidden"}}>
          <div style={{background:"linear-gradient(135deg,#f0f4ff,#faf5ff)",padding:14}}>
            <div style={{fontSize:12,fontWeight:700,color:"#6366f1",marginBottom:8}}>✨ AIによる一言</div>
            <div style={{fontSize:13,color:"#374151",lineHeight:1.75}}>{log.aiTeaser}</div>
          </div>
          <div style={{background:"linear-gradient(to bottom,rgba(245,243,255,0.5),#f5f3ff)",padding:"14px",textAlign:"center",borderTop:"1px solid #e0e7ff"}}>
            <div style={{fontSize:12,color:"#6366f1",fontWeight:700,marginBottom:4}}>続きの解析はプレミアムプランで</div>
            <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>気圧・睡眠・月経周期との関連など詳しい分析が読めます</div>
            <button onClick={()=>FREE_MODE&&alert('現在、全機能を無料でご利用いただけます。\nサービスが安定した後に有料プランを開始予定です。')}
              style={{padding:"8px 20px",borderRadius:20,border:"none",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",fontSize:12,fontWeight:700,cursor:FREE_MODE?"not-allowed":"pointer",filter:FREE_MODE?"grayscale(1)":"none",opacity:FREE_MODE?0.5:1}}>
              ⭐ プレミアムプランを見る
            </button>
            {FREE_MODE&&<div style={{fontSize:10,color:"#94a3b8",marginTop:6}}>現在無料提供中</div>}
          </div>
        </div>
      )}

      {/* 全文カード（プレミアム or 全文生成済み） */}
      {(log.aiAnalysis || homeAiError) && (
        <div style={{background:"linear-gradient(135deg,#f0f4ff,#faf5ff)",borderRadius:16,padding:14,marginBottom:12,border:"1px solid #e0e7ff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:"#6366f1"}}>✨ AIによる解析</div>
              {log.aiAnalysis && <div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{log.aiGeneratedAt?new Date(log.aiGeneratedAt).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})+"生成":"生成済み"}</div>}
            </div>
            <button onClick={generateHomeAI} disabled={homeAiLoading}
              style={{fontSize:11,color:"#6366f1",background:"#ede9fe",border:"1px solid #c4b5fd",borderRadius:8,cursor:"pointer",padding:"5px 10px",fontWeight:600,opacity:homeAiLoading?0.6:1}}>
              {homeAiLoading?"生成中...":"🔄 再生成"}
            </button>
          </div>
          {homeAiError && <div style={{fontSize:12,color:log.aiAnalysis?"#94a3b8":"#ef4444",marginTop:4}}>{log.aiAnalysis?"再生成に失敗しました（前回の解析を表示中）":homeAiError}</div>}
          {log.aiAnalysis && (
            <>
              <div style={{fontSize:13,color:"#374151",lineHeight:1.75,whiteSpace:"pre-wrap"}}>{log.aiAnalysis}</div>
              {/* フィードバックUI */}
              <div style={{marginTop:10,borderTop:"1px solid #e0e7ff",paddingTop:8}}>
                {homeAiFbDone ? (
                  <div style={{fontSize:12,color:"#6366f1",textAlign:"center"}}>フィードバックを送りました。ありがとう！</div>
                ) : homeAiFbMode === 'comment' ? (
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    <textarea value={homeAiFbText} onChange={e=>setHomeAiFbText(e.target.value)}
                      placeholder="一言どうぞ..."
                      style={{width:"100%",minHeight:60,border:"1px solid #c7d2fe",borderRadius:8,padding:"8px 10px",fontSize:12,outline:"none",resize:"none"}}/>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setHomeAiFbMode(null)}
                        style={{flex:1,padding:"6px 0",borderRadius:8,border:"1px solid #e0e7ff",background:"white",fontSize:12,cursor:"pointer",color:"#94a3b8"}}>
                        キャンセル
                      </button>
                      <button onClick={()=>submitHomeAiFeedback('comment',homeAiFbText)}
                        style={{flex:2,padding:"6px 0",borderRadius:8,border:"none",background:"#6366f1",color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                        送る
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:6}}>
                    {[{fb:'good',label:'👍 良かった',bg:'#f0fdf4',border:'#86efac',color:'#16a34a'},
                      {fb:'bad', label:'👎 いまいち',bg:'#fff7ed',border:'#fdba74',color:'#ea580c'},
                      {fb:'comment',label:'💬 一言',bg:'#eff6ff',border:'#93c5fd',color:'#2563eb'}]
                      .map(({fb,label,bg,border,color})=>(
                        <button key={fb} onClick={()=>{ if(fb==='comment'){ setHomeAiFbMode('comment'); } else { submitHomeAiFeedback(fb); } }}
                          style={{flex:1,padding:"5px 2px",borderRadius:8,border:`1px solid ${border}`,background:bg,color:color,fontSize:11,fontWeight:600,cursor:"pointer",textAlign:"center"}}>
                          {label}
                        </button>
                    ))}
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Calendar Tab ─────────────────────────────────────────────
function CalendarTab({ logs, setLogs, settings, weatherHist, setWH, profile, goEditDate, authToken, currentUser }) {
  const isPremium = checkPremium(currentUser);
  const [view, setView]     = useState(new Date());
  const [selected, setSel]  = useState(new Date().getDate());
  const [aiLoading, setAIL] = useState(false);
  const [aiError, setAIErr] = useState(null);
  const [aiFbMode, setAiFbMode] = useState(null);  // null|'good'|'bad'|'comment'
  const [aiFbText, setAiFbText] = useState('');
  const [aiFbDone, setAiFbDone] = useState(false);
  // 日付切り替え時にエラー・フィードバック状態をリセット
  React.useEffect(()=>{
    setAIErr(null);
    setAiFbMode(null); setAiFbText(''); setAiFbDone(false);
  }, [selected]);
  const y=view.getFullYear(), m=view.getMonth();
  const firstDay=new Date(y,m,1).getDay(), daysInM=new Date(y,m+1,0).getDate();
  const today=todayStr();

  const cells=[]; for(let i=0;i<firstDay;i++)cells.push(null); for(let d=1;d<=daysInM;d++)cells.push(d);
  const selDs=selected?`${y}-${String(m+1).padStart(2,"0")}-${String(selected).padStart(2,"0")}`:null;
  const selLog=selDs?logs[selDs]:null;

  // 過去日の気象データ補完（サーバーキャッシュ優先 → Open-Meteoアーカイブにフォールバック）
  React.useEffect(()=>{
    if(!selDs || selDs >= todayStr()) return;
    if(weatherHist[selDs]?.tempMax != null) return; // 既にlocalStorageにデータあり
    const lat = profile?.lat;
    const lon = profile?.lon;
    if(!lat || !lon) return;
    const prevDs = offsetDate(selDs, -1);
    const zp = (profile?.postalCode?.replace(/[^0-9]/g,'')||'').substring(0,3);

    const fetchFromArchive = () => {
      fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${prevDs}&end_date=${selDs}&daily=temperature_2m_max,temperature_2m_min,surface_pressure_mean,weather_code&timezone=auto`)
        .then(r=>r.json())
        .then(d=>{
          if(!d?.daily?.time) return;
          d.daily.time.forEach((date,i)=>{
            const nd = {
              tempMax:d.daily.temperature_2m_max?.[i],
              tempMin:d.daily.temperature_2m_min?.[i],
              pressureAvg:d.daily.surface_pressure_mean?.[i],
              weatherCode:d.daily.weather_code?.[i],
            };
            setWH(p=>{ if(p[date]?.tempMax!=null) return p; return {...p,[date]:{...p[date],...nd}}; });
            // アーカイブから取得したデータをサーバーにも保存（次回以降の同エリアユーザーが使える）
            if(zp.length===3 && authToken && nd.tempMax!=null) {
              api('saveWeatherCache',{zip_prefix:zp,lat,lon,date,hour:0,
                tempMax:nd.tempMax, tempMin:nd.tempMin,
                pressureAvg:nd.pressureAvg, weatherCode:nd.weatherCode},authToken);
            }
          });
        }).catch(()=>{});
    };

    // ① サーバーキャッシュを確認
    if(zp.length===3 && authToken) {
      api('getWeatherCache',{zip_prefix:zp,dates:[prevDs,selDs]},authToken)
        .then(res=>{
          let found = false;
          if(res?.data) {
            [prevDs,selDs].forEach(date=>{
              if(res.data[date]?.tempMax!=null) {
                setWH(p=>({...p,[date]:{...p[date],...res.data[date]}}));
                if(date===selDs) found=true;
              }
            });
          }
          if(!found) fetchFromArchive(); // ② キャッシュになければOpen-Meteoへ
        }).catch(fetchFromArchive);
    } else {
      fetchFromArchive(); // 郵便番号未設定 or 未ログイン時は直接アーカイブへ
    }
  },[selDs]);

  // 月ビュー切替時: 当月の過去日気象を一括フェッチ（1回のAPIリクエスト）
  React.useEffect(()=>{
    const lat = profile?.lat;
    const lon = profile?.lon || (lat ? null : 35.6762); // 座標なければ東京
    const useLat = lat || 35.6762;
    const useLon = lon || 139.6503;
    const today = todayStr();
    const monthEnd = `${y}-${String(m+1).padStart(2,"0")}-${String(daysInM).padStart(2,"0")}`;
    const endDate = today < monthEnd ? today : monthEnd;
    const startDate = `${y}-${String(m+1).padStart(2,"0")}-01`;
    if(endDate < startDate) return; // 未来月はスキップ

    // 当月に未取得の過去日があるかチェック
    let missingCount = 0;
    for(let d=1; d<=daysInM; d++){
      const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      if(ds > today) break;
      if(weatherHist[ds]?.tempMax == null) missingCount++;
    }
    if(missingCount === 0) return; // 全日取得済み

    // 気圧差計算のため前月末日からフェッチ
    const prevMonthEnd = offsetDate(startDate, -1);
    fetch(`https://archive-api.open-meteo.com/v1/archive?latitude=${useLat}&longitude=${useLon}&start_date=${prevMonthEnd}&end_date=${endDate}&daily=temperature_2m_max,temperature_2m_min,surface_pressure_mean,weather_code&timezone=auto`)
      .then(r=>r.json())
      .then(d=>{
        if(!d.daily?.time) return;
        const zp=(profile?.postalCode?.replace(/[^0-9]/g,'')||'').substring(0,3);
        // 一括でsetWH（再レンダリングを1回にまとめる）
        setWH(p=>{
          const updates={};
          d.daily.time.forEach((date,i)=>{
            if(p[date]?.tempMax!=null) return; // 既存データは保護
            const nd={
              tempMax:   d.daily.temperature_2m_max?.[i],
              tempMin:   d.daily.temperature_2m_min?.[i],
              pressureAvg: d.daily.surface_pressure_mean?.[i],
              weatherCode: d.daily.weather_code?.[i],
            };
            if(nd.tempMax==null) return;
            updates[date]={...p[date],...nd};
            // サーバーキャッシュにも保存
            if(zp.length===3 && authToken){
              api('saveWeatherCache',{zip_prefix:zp,lat:useLat,lon:useLon,date,hour:0,
                tempMax:nd.tempMax, tempMin:nd.tempMin,
                pressureAvg:nd.pressureAvg, weatherCode:nd.weatherCode},authToken);
            }
          });
          return Object.keys(updates).length>0 ? {...p,...updates} : p;
        });
      }).catch(()=>{});
  },[view]);  // 月ビューが変わるたびに実行

  // AI解析生成
  const generateAI = async (ds) => {
    if (!authToken || aiLoading) return;
    setAIL(true); setAIErr(null);
    // weatherHistから該当日の天気データを抽出
    const wh = weatherHist[ds] || {};
    const weather = {
      temp_min:    wh.temp_min    ?? wh.tempMin    ?? null,
      temp_max:    wh.temp_max    ?? wh.tempMax    ?? null,
      pressure:    wh.pressure    ?? null,
      humidity:    wh.humidity    ?? null,
      description: wh.description ?? null,
    };
    const r = await api('generateAiAnalysis', { date: ds, weather }, authToken);
    setAIL(false);
    if (!r || r.error) { setAIErr(r?.error || 'AI解析の生成に失敗しました'); return; }
    // ローカルのlogsを更新
    setLogs(prev => ({
      ...prev,
      [ds]: { ...(prev[ds] || {}), aiAnalysis: r.analysis, aiGeneratedAt: new Date().toISOString() }
    }));
    // 再生成したらフィードバックをリセット
    setAiFbMode(null); setAiFbText(''); setAiFbDone(false);
  };

  // AIフィードバック送信
  const submitAiFeedback = async (ds, fb, text='') => {
    if (!authToken) return;
    await api('saveAiFeedback', { date: ds, feedback: fb, feedbackText: text }, authToken);
    setAiFbDone(true);
  };

  // ティザー生成（無料ユーザー向け・短縮版）
  const generateTeaser = async (ds) => {
    if (!authToken || aiLoading) return;
    setAIL(true); setAIErr(null);
    const r = await api('generateAiTeaser', { date: ds }, authToken);
    setAIL(false);
    if (!r || r.error) { setAIErr(r?.error || 'AI解析の生成に失敗しました'); return; }
    setLogs(prev => ({
      ...prev,
      [ds]: { ...(prev[ds] || {}), aiTeaser: r.teaser }
    }));
  };

  // 凡例の動的説明（中央値ベース）
  const { baseline: medianMins, total: totalN, outlierRemoved } = calcBaseline(logs);

  return (
    <div style={{padding:"16px 16px 8px"}}>
      <div style={{fontSize:24,fontWeight:800,color:"#1e293b",marginBottom:16,letterSpacing:-0.5}}>カレンダー</div>

      <div style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <button onClick={()=>setView(new Date(y,m-1))} style={{background:"#f0f4ff",border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <div style={{fontWeight:700,fontSize:16,color:"#1e293b"}}>{y}年{m+1}月</div>
          <button onClick={()=>setView(new Date(y,m+1))} style={{background:"#f0f4ff",border:"none",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:6}}>
          {["日","月","火","水","木","金","土"].map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,color:i===0?"#ef4444":i===6?"#6366f1":"#94a3b8",paddingBottom:4}}>{d}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {cells.map((d,i)=>{
            if(!d) return <div key={i}/>;
            const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const {bg}=relativeColor(ds,logs,settings,weatherHist);
            const l=logs[ds], isT=ds===today, isSel=d===selected;
            // 生理開始日（過去の実績＋未来の予測）
            const isPeriodStart = settings.menstrualCycle && settings.menstrualLastStart && (()=>{
              const cycle = settings.menstrualLength || 28;
              const start = new Date(settings.menstrualLastStart+"T00:00:00");
              const date  = new Date(ds+"T00:00:00");
              const diff  = Math.round((date-start)/(1000*60*60*24));
              return ((diff%cycle)+cycle)%cycle===0;
            })();
            return (
              <div key={i} onClick={()=>setSel(d===selected?null:d)} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:10,
                background:bg,
                border:isSel?"3px solid #6366f1":isT?"2px solid #6366f1":isPeriodStart?"2px solid #fb7185":"none",
                boxSizing:"border-box",cursor:"pointer"}}>
                <span style={{fontSize:13,fontWeight:isT||isSel?700:400,color:isSel||isT?"#6366f1":"#1e293b"}}>{d}</span>
                <div style={{display:"flex",gap:2,marginTop:1}}>
                  {isPeriodStart&&<div style={{width:5,height:5,borderRadius:"50%",background:"#fb7185"}}/>}
                  {l?.symptoms?.length>0&&<div style={{width:5,height:5,borderRadius:"50%",background:"#f59e0b"}}/>}
                  {l?.badDayReasons?.length>0&&<div style={{width:5,height:5,borderRadius:"50%",background:"#6366f1"}}/>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* 凡例（相対評価ベース） */}
      <div style={{background:"white",borderRadius:16,padding:"12px 14px",marginBottom:14,marginLeft:-16,marginRight:-16}}>
        <div style={{fontSize:12,fontWeight:600,color:"#64748b",marginBottom:8}}>
          色は活動時間・症状・心当たり・生理周期・よかったこと・気象を総合して判定{medianMins>0?`（活動中央値 ${fmtMins(Math.round(medianMins))}${outlierRemoved?" / 外れ値除外済":""}）`:""}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {[["#e2e8f0","未記入"],["#f87171","動けなかった"],["#fb923c","しんどかった"],["#fde68a","少し動けた"],["#bef264","まあまあ"],["#22c55e","よかった"]].map(([c,l])=>(
            <div key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748b"}}><div style={{width:12,height:12,borderRadius:3,background:c,border:"1px solid rgba(0,0,0,0.05)"}}/>{l}</div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
          {settings.menstrualCycle&&<div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748b"}}><div style={{width:5,height:5,borderRadius:"50%",background:"#fb7185"}}/>生理開始日</div>}
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748b"}}><div style={{width:5,height:5,borderRadius:"50%",background:"#f59e0b"}}/>症状あり</div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748b"}}><div style={{width:5,height:5,borderRadius:"50%",background:"#6366f1"}}/>理由メモあり</div>
        </div>
      </div>

      {/* 選択日の詳細 */}
      {selDs && (
        <div className="fade-in" style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,color:"#1e293b",fontSize:16}}>{fmtDate(selDs)} の記録</div>
            <button onClick={()=>goEditDate(selDs)} style={{background:"#6366f1",color:"white",border:"none",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>✏️ 記録する</button>
          </div>

          {/* 客観的な出来事 */}
          {(() => {
            const evts = objectiveEvents(selDs, weatherHist, settings);
            return evts.length>0 ? (
              <div style={{background:"#f8faff",borderRadius:12,padding:"10px 12px",marginBottom:12}}>
                <div style={{fontSize:12,fontWeight:700,color:"#64748b",marginBottom:8}}>📡 この日の客観的な出来事</div>
                {evts.map((e,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,fontSize:13,color:e.warn?"#dc2626":"#475569",fontWeight:e.warn?700:400}}>
                    <span>{e.icon}</span><span>{e.text}</span>{e.warn&&<span style={{fontSize:10,background:"#fee2e2",color:"#dc2626",borderRadius:6,padding:"1px 6px"}}>注意</span>}
                  </div>
                ))}
                {!weatherHist[selDs]&&<div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>気象データを取得中、または郵便番号未設定のため取得できません</div>}
              </div>
            ) : null;
          })()}

          {selLog ? (
            <>
              {/* 動けた時間 */}
              <div style={{background:"#f0f4ff",borderRadius:12,padding:"10px 12px"}}>
                <div style={{fontSize:12,color:"#4338ca",marginBottom:6,fontWeight:700}}>⏱️ 動けた時間: {fmtMins(calcMins(selLog.activeBlocks))}</div>
                {(selLog.activeBlocks||[]).length>0
                  ? (selLog.activeBlocks||[]).map((b,i)=><div key={i} style={{fontSize:13,color:"#475569",marginBottom:2}}>🕐 {b.start} 〜 {b.end}</div>)
                  : <div style={{fontSize:12,color:"#94a3b8"}}>時間帯の記録なし</div>
                }
              </div>

              {/* からだのデータ（歩数・睡眠・体温） */}
              {(selLog.steps!=null||selLog.sleepHours!=null||selLog.bodyTemp!=null)&&(
                <div style={{marginTop:10,background:"#f0fdf4",borderRadius:12,padding:"10px 12px"}}>

// ─── Insights Tab ─────────────────────────────────────────────
function InsightsTab({ logs, weather, communityStats, authToken, profile, settings, currentUser }) {
  const [period, setPeriod] = useState('15');
  const [report15, setReport15] = useState(()=>load('bl_insights_report_15', null));
  const [report30, setReport30] = useState(()=>load('bl_insights_report_30', null));
  const insightsReport = period==='15' ? report15 : report30;
  const [reportLoading, setReportLoading] = useState(false);
  const isPremium = checkPremium(currentUser);

  // ── 期間フィルタ ────────────────────────────────────────────
  const daysAgoStr = n => { const d=new Date(); d.setDate(d.getDate()-n); return localDate(d); };
  const filterFrom = daysAgoStr(parseInt(period)-1);
  const filteredEntries = Object.entries(logs).filter(([d])=>d>=filterFrom);
  const filteredCount   = filteredEntries.length;
  const periodLabel     = period==='15'?'半月（直近15日）':'月次（直近30日）';

  // ── ポジティブ項目集計 ─────────────────────────────────────
  const posCount={};
  filteredEntries.forEach(([,l])=>(l.positiveItems||[]).forEach(p=>{posCount[p]=(posCount[p]||0)+1;}));
  const topPositive = Object.entries(posCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const daysWithPos  = filteredEntries.filter(([,l])=>(l.positiveItems||[]).length>0).length;
  const posRate      = filteredCount>0?Math.round(daysWithPos/filteredCount*100):0;

  // ── 症状集計 ───────────────────────────────────────────────
  const symCount={};
  filteredEntries.forEach(([,l])=>(l.symptoms||[]).forEach(s=>{symCount[s]=(symCount[s]||0)+1;}));
  const topSymptoms  = Object.entries(symCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const daysWithSym  = filteredEntries.filter(([,l])=>(l.symptoms||[]).length>0).length;
  const symRate      = filteredCount>0?Math.round(daysWithSym/filteredCount*100):0;

  // ── 心当たり集計 ───────────────────────────────────────────
  const reasonCount={};
  filteredEntries.forEach(([,l])=>(l.badDayReasons||[]).forEach(r=>{reasonCount[r]=(reasonCount[r]||0)+1;}));
  const topReasons   = Object.entries(reasonCount).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // ── 相関インサイト ─────────────────────────────────────────
  // よかったことを記録した日 vs そうでない日 の平均症状数
  const withPos    = filteredEntries.filter(([,l])=>(l.positiveItems||[]).length>0);
  const withoutPos = filteredEntries.filter(([,l])=>(l.positiveItems||[]).length===0);
  const avgSym = arr => arr.length===0 ? 0 : arr.reduce((s,[,l])=>s+(l.symptoms||[]).length,0)/arr.length;
  const avgSymWithPos    = avgSym(withPos);
  const avgSymWithoutPos = avgSym(withoutPos);
  const showCorrelation  = withPos.length>=3 && withoutPos.length>=3;

  // ── 動けた時間（period連動）──────────────────────────────────
  const nDays=parseInt(period);
  const lastN=Array.from({length:nDays},(_,i)=>{ const d=new Date();d.setDate(d.getDate()-(nDays-1-i));const ds=localDate(d),l=logs[ds];return{ds,label:`${d.getMonth()+1}/${d.getDate()}`,mins:l?calcMins(l.activeBlocks):null}; });
  const recorded=lastN.filter(d=>d.mins!==null);
  const maxMins=recorded.length?Math.max(...recorded.map(d=>d.mins)):0;
  const recSorted=[...recorded].map(d=>d.mins).sort((a,b)=>a-b);
  const rN=recSorted.length;
  const medianMins14=(()=>{
    if(!rN) return 0;
    let arr=recSorted;
    if(rN>=14){const q1=arr[Math.floor(rN*0.25)],q3=arr[Math.floor(rN*0.75)],iqr=q3-q1;const f=arr.filter(v=>v>=q1-1.5*iqr&&v<=q3+1.5*iqr);if(f.length>=3)arr=f;}
    const m=arr.length;return Math.round(m%2===1?arr[Math.floor(m/2)]:(arr[Math.floor(m/2)-1]+arr[Math.floor(m/2)])/2);
  })();
  const W=320,H=100,bw=Math.max(W/nDays-2,3),maxH=Math.max(maxMins,30);

  // ── ゴールデンタイム（period連動）───────────────────────────
  const hourCounts=Array(24).fill(0);
  filteredEntries.forEach(([,l])=>(l.activeBlocks||[]).forEach(b=>{ if(!b.start||!b.end)return;const sh=parseInt(b.start),eh=parseInt(b.end);for(let h=sh;h<=Math.min(eh,23);h++)hourCounts[h]++; }));

  // ── 生理症状集計（period連動）──────────────────────────────
  const menstrualCount={};
  filteredEntries.forEach(([,l])=>(l.menstrualSymptoms||[]).forEach(s=>{menstrualCount[s]=(menstrualCount[s]||0)+1;}));
  const topMenstrual=Object.entries(menstrualCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const showMenstrual=(settings?.menstrualCycle)&&topMenstrual.length>0;
  const peakH=hourCounts.reduce((best,v,h)=>v>hourCounts[best]?h:best,0);
  const maxHC=hourCounts[peakH];
  const goldenStart=(()=>{let s=peakH;while(s>0&&hourCounts[s-1]>=maxHC*0.85&&peakH-s<2)s--;return s;})();
  const goldenEnd=(()=>{let e=peakH;while(e<23&&hourCounts[e+1]>=maxHC*0.85&&e-peakH<2)e++;return e;})();
  const goldenLabel=goldenStart===goldenEnd?`${goldenStart}時台`:`${goldenStart}〜${goldenEnd+1}時`;
  const timeLabel=h=>h<12?`${h}時（午前）`:h<17?`${h}時（午後）`:`${h}時（夕方）`;

  // ── コミュニティ ───────────────────────────────────────────
  const mySymptoms=new Set(logs[todayStr()]?.symptoms||[]);
  const matched=communityStats?.filter(s=>mySymptoms.has(s.symptom))||[];

  // ── 期間サマリー計算（期間セレクタと連動：7日=週次、30日=月次）────────────
  // 複合スコア: 活動時間(時間) + よかった項目数×1.5 − 症状数×2
  // 全ログから各指標の中央値を計算（未記入を除外）
  const allEntries = Object.entries(logs);
  const med = arr => { if(!arr.length) return null; const s=[...arr].sort((a,b)=>a-b); const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; };
  const medSteps = med(allEntries.map(([,l])=>l.steps).filter(v=>v!=null&&v>0));
  const medSleep = med(allEntries.map(([,l])=>l.sleepHours).filter(v=>v!=null&&v>0));
  const medTemp  = med(allEntries.map(([,l])=>l.bodyTemp).filter(v=>v!=null&&v>0));

  const dayScore=(l, medians={})=>{
    const active=calcMins(l.activeBlocks)||0;
    const pos=(l.positiveItems||[]).length;
    const sym=(l.symptoms||[]).length;
    let score = active/60 + pos*1.5 - sym*2;
    // 歩数（記入ありの日のみ）
    if(l.steps!=null && medians.steps) {
      const ratio = l.steps / medians.steps;
      if(ratio >= 1.5)      score += 1;
      else if(ratio <= 0.5) score -= 0.5;
    }
    // 睡眠時間（記入ありの日のみ）
    if(l.sleepHours!=null && medians.sleep) {
      const diff = l.sleepHours - medians.sleep;
      if(l.sleepHours <= 5)  score -= 2;
      else if(diff <= -1)    score -= 1;
      else if(diff >= 1)     score += 0.5;
    }
    // 体温（記入ありの日のみ: 37.5℃以上で減点）
    if(l.bodyTemp!=null) {
      if(l.bodyTemp >= 38.0)      score -= 3;
      else if(l.bodyTemp >= 37.5) score -= 1.5;
      else if(l.bodyTemp >= 37.0) score -= 0.5;
    }
    return score;
  };
  const calcWeekStats = entries => {
    const count=entries.length;
    const symDays=entries.filter(([,l])=>(l.symptoms||[]).length>0).length;
    const posDays=entries.filter(([,l])=>(l.positiveItems||[]).length>0).length;
    const mins=[...entries].map(([,l])=>calcMins(l.activeBlocks)).filter(m=>m!==null).sort((a,b)=>a-b);
    const n=mins.length;
    const medActive=n?(n%2===1?mins[Math.floor(n/2)]:(mins[Math.floor(n/2)-1]+mins[Math.floor(n/2)])/2):null;
    const medians={steps:medSteps, sleep:medSleep, temp:medTemp};
    const scored=entries.map(([d,l])=>({d,l,score:dayScore(l,medians)}));
    const bestE=scored.length?scored.reduce((b,x)=>x.score>b.score?x:b):null;
    const worstE=scored.length?scored.reduce((w,x)=>x.score<w.score?x:w):null;
    const bestDay=bestE?[bestE.d,bestE.l]:null;
    const worstDay=worstE?[worstE.d,worstE.l]:null;
    return{count,symDays,posDays,medActive,bestDay,worstDay};
  };
  // 前期間: 同じ日数分だけさかのぼる（7日なら8〜14日前、30日なら31〜60日前）
  const pLen=parseInt(period);
  const prevFilterFrom=daysAgoStr(pLen*2-1);
  const prevPeriodEntries=Object.entries(logs).filter(([d])=>d>=prevFilterFrom&&d<filterFrom);
  const curWS  = calcWeekStats(filteredEntries);
  const prevWS = calcWeekStats(prevPeriodEntries);
  const summaryLabel     = period==='15'?'📅 半月サマリー':'📅 月次サマリー';
  const diffLabel        = period==='15'?'↑↓は直前15日比':'↑↓は直前30日比';
  const showPeriodSummary = curWS.count>0||prevWS.count>0;
  const WeekDiff=({cur,prev,lowerIsBetter=false,fmt=null})=>{
    if(prev===null||cur===null||prev===undefined)return null;
    const d=cur-prev; if(d===0)return<span style={{color:"#94a3b8",fontSize:10,marginLeft:3}}>－</span>;
    const up=d>0; const good=lowerIsBetter?!up:up;
    const label=fmt?fmt(Math.abs(d)):Math.abs(d);
    return<span style={{color:good?"#10b981":"#ef4444",fontSize:10,fontWeight:700,marginLeft:3}}>{up?"↑":"↓"}{label}</span>;
  };

  // ── AI総合レポート生成 ──────────────────────────────────────
  const generateInsightsReport = async () => {
    if(!authToken)return;
    setReportLoading(true);
    try{
      const pDays=parseInt(period);
      const fromStr=daysAgoStr(pDays);
      const pEntries=Object.entries(logs).filter(([d])=>d>=fromStr);
      const symC={},reasonC={},goodC={};
      let totalM=0,aDays=0;
      pEntries.forEach(([,l])=>{
        (l.symptoms||[]).forEach(s=>symC[s]=(symC[s]||0)+1);
        (l.badDayReasons||[]).forEach(r=>reasonC[r]=(reasonC[r]||0)+1);
        (l.positiveItems||[]).forEach(g=>goodC[g]=(goodC[g]||0)+1);
        const m=calcMins(l.activeBlocks); if(m!==null){totalM+=m;aDays++;}
      });
      const sD=pEntries.filter(([,l])=>(l.symptoms||[]).length>0).length;
      const pD=pEntries.filter(([,l])=>(l.positiveItems||[]).length>0).length;
      const payload={
        period:pDays,recordDays:pEntries.length,
        symRate:pEntries.length>0?Math.round(sD/pEntries.length*100):0,
        posRate:pEntries.length>0?Math.round(pD/pEntries.length*100):0,
        avgActiveMins:aDays>0?Math.round(totalM/aDays):0,
        topSymptoms:Object.entries(symC).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([symptom,count])=>({symptom,count})),
        topReasons:Object.entries(reasonC).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([reason,count])=>({reason,count})),
        topGoodItems:Object.entries(goodC).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([item,count])=>({item,count})),
        profile:{name:profile?.name,age:calcAge(profile?.birthdate)??profile?.age,gender:profile?.gender,existingConditions:profile?.existingConditions||""}
      };
      const data=await api('generateInsightsReport',payload,authToken);
      if(data?.report){
        const r={text:data.report,generatedAt:new Date().toISOString(),period};
        if(period==='15'){setReport15(r); save('bl_insights_report_15',r);}
        else             {setReport30(r); save('bl_insights_report_30',r);}
      }
    }catch(e){console.error(e);}
    setReportLoading(false);
  };

  // ── パーソナライズされたアドバイス ──────────────────────────────
  const getAdvices = () => {
    // ★ 全て期間セレクタと同じ filteredEntries を使用（週次/月次で統一）
    if(filteredEntries.length<3)return[];
    const advices=[];
    // 1. 心当たりランキング
    const fRC={};
    filteredEntries.forEach(([,l])=>(l.badDayReasons||[]).forEach(r=>fRC[r]=(fRC[r]||0)+1));
    const topR=Object.entries(fRC).sort((a,b)=>b[1]-a[1])[0];
    if(topR) advices.push({icon:'⚠️',title:`「${topR[0]}」に注目`,
      text:`${periodLabel}で「${topR[0]}」が最も多い心当たりです（${topR[1]}回）。この傾向が続くようなら、前日からの対策や予定の調整を意識すると、体調が安定しやすくなるかもしれません。`,
      bg:'#fef9c3',border:'#fde047',textColor:'#713f12'});
    // 2. よかったこと×症状の相関
    const avgSymF = arr=>arr.length===0?0:arr.reduce((s,[,l])=>s+(l.symptoms||[]).length,0)/arr.length;
    const fWP=filteredEntries.filter(([,l])=>(l.positiveItems||[]).length>0);
    const fWOP=filteredEntries.filter(([,l])=>(l.positiveItems||[]).length===0);
    const aWP=avgSymF(fWP), aWOP=avgSymF(fWOP);
    if(fWP.length>=3&&fWOP.length>=3&&aWP<aWOP)
      advices.push({icon:'💚',title:'よかったことの記録が効いています',
        text:`${periodLabel}を見ると、よかったことを記録した日はそうでない日より症状が平均${(aWOP-aWP).toFixed(1)}個少ない傾向があります。小さな達成感や心地よいことを意識して記録し続けることが、体調の安定に繋がっています。`,
        bg:'#f0fdf4',border:'#86efac',textColor:'#065f46'});
    // 3. ゴールデンタイム（hourCountsは全記録ベース — 累積データほど精度が上がる）
    if(hourCounts.some(v=>v>0))
      advices.push({icon:'⏰',title:`${goldenLabel}を活かして`,
        text:`これまでの記録から、${goldenLabel}が最も動きやすい時間帯です。大事な予定や少し負荷のある作業はこの時間帯に合わせると、消耗を減らせる可能性があります。`,
        bg:'#eff6ff',border:'#93c5fd',textColor:'#1e40af'});
    // 4. ペーシング提案
    if(symRate>=50)
      advices.push({icon:'🔋',title:'ペーシングを意識しましょう',
        text:`${periodLabel}の${symRate}%の日に症状が出ています。調子の良い日でも全力を出し切らず、翌日のために余力を残す「ペーシング」を意識することで、波のある体調を少しずつ安定させやすくなります。`,
        bg:'#fdf4ff',border:'#e9d5ff',textColor:'#6b21a8'});
    // 5. 活動目安（7日は14日rolling中央値、30日は30日中央値を使用）
    const adviceMedian = period==='15' ? (curWS.medActive ?? medianMins14) : (curWS.medActive ?? medianMins14);
    const adviceMedianLabel = period==='15' ? '直近15日間' : '直近30日間';
    if(adviceMedian>0){
      const goalMins=Math.min(Math.round(adviceMedian*1.1/5)*5,adviceMedian+30);
      advices.push({icon:'🎯',title:'活動時間の目安',
        text:`${adviceMedianLabel}の活動時間の中央値は${fmtMins(adviceMedian)}です。${periodLabel}の目安として1日${fmtMins(goalMins)}を意識してみましょう。超えた日は素直に自分を認めてください。`,
        bg:'#f0f9ff',border:'#7dd3fc',textColor:'#0c4a6e'});
    }
    if(advices.length===0)return[];
    const dayNum=Math.floor(Date.now()/(24*60*60*1000));
    const offset=dayNum%advices.length;
    const rotated=[...advices.slice(offset),...advices.slice(0,offset)];
    return rotated.slice(0,3);
  };
  const advices=getAdvices();

  // ── レンダリング ───────────────────────────────────────────
  const BarRow = ({label, count, max, bg, track}) => (
    <div style={{marginBottom:9}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:13,color:"#1e293b"}}>{label}</span>
        <span style={{fontSize:12,color:"#94a3b8"}}>{count}回</span>

  return (
    <div style={{padding:"16px 16px 8px"}}>

      <div style={{position:"relative"}}>

        </div>
      </div>

      {/* ② 動けた時間グラフ（period連動） */}
      <div style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
            {[
              {label:"記録日数",cur:curWS.count,prev:prevWS.count,unit:"日",color:"#6366f1",lowerIsBetter:false},
              {label:"よかった日",cur:curWS.posDays,prev:prevWS.posDays,unit:"日",color:"#10b981",lowerIsBetter:false},

                <div style={{marginTop:3,minHeight:14}}><WeekDiff cur={c.cur} prev={c.prev} lowerIsBetter={c.lowerIsBetter}/></div>

          </div>
          {curWS.medActive!==null&&(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#f0f4ff",borderRadius:10,marginBottom:10,fontSize:12}}>
              <span style={{color:"#64748b"}}>⚡ 活動中央値</span>
              <span style={{fontWeight:700,color:"#6366f1"}}>{fmtMins(curWS.medActive)}

          {/* 最も良かった日・最も大変だった日（大きく表示） */}

              return(
                <div style={{background:"linear-gradient(135deg,#f0fdf4,#dcfce7)",borderRadius:14,padding:"14px 16px",border:"1px solid #86efac"}}>
                  <div style={{fontSize:11,color:"#16a34a",fontWeight:600,marginBottom:6}}>🌟 最も良かった日</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:6}}>
                    <div style={{fontSize:26,fontWeight:800,color:"#059669",lineHeight:1}}>{new Date(curWS.bestDay[0]+"T00:00:00").toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}</div>
                    {m>0&&<div style={{fontSize:13,color:"#15803d",fontWeight:600}}>{fmtMins(m)} 活動</div>}

                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>

                  </div>
                </div>
              );
            })()}
            {curWS.worstDay&&(()=>{
              const l=curWS.worstDay[1];
              const m=calcMins(l.activeBlocks)||0;
              const pos=(l.positiveItems||[]).length;
              const sym=(l.symptoms||[]).length;
              const symItems=(l.symptoms||[]).slice(0,3);
              return(
                <div style={{background:"linear-gradient(135deg,#fff7f7,#fee2e2)",borderRadius:14,padding:"14px 16px",border:"1px solid #fca5a5"}}>
                  <div style={{fontSize:11,color:"#dc2626",fontWeight:600,marginBottom:6}}>⚡ 最も大変だった日</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:6}}>
                    <div style={{fontSize:26,fontWeight:800,color:"#dc2626",lineHeight:1}}>{new Date(curWS.worstDay[0]+"T00:00:00").toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"})}</div>
                    {sym>0&&<div style={{fontSize:13,color:"#b91c1c",fontWeight:600}}>症状 {sym}個</div>}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {symItems.map(s=><span key={s} style={{fontSize:11,background:"#fecaca",color:"#991b1b",padding:"2px 8px",borderRadius:8}}>{s}</span>)}
                    {pos===0&&<span style={{fontSize:11,background:"#fee2e2",color:"#b91c1c",padding:"2px 8px",borderRadius:8,fontWeight:600}}>よかったこと 0</span>}
                    {m===0&&<span style={{fontSize:11,background:"#fee2e2",color:"#b91c1c",padding:"2px 8px",borderRadius:8}}>活動なし</span>}
                  </div>
                </div>
              );
            })()}
          </div>
          {prevWS.count>0&&<div style={{fontSize:10,color:"#94a3b8",marginTop:8,textAlign:"right"}}>{diffLabel}</div>}
        </div>
      )}

      {/* 🧭 パーソナライズされたアドバイス */}
      {advices.length>0&&(
        <div style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:700,color:"#1e293b",fontSize:15}}>🧭 あなたへのアドバイス</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>🔄 毎日更新</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {advices.map((a,i)=>(
              <div key={i} style={{background:a.bg,border:`1px solid ${a.border}`,borderRadius:12,padding:"10px 12px"}}>
                <div style={{fontSize:13,fontWeight:700,color:a.textColor,marginBottom:4}}>{a.icon} {a.title}</div>
                <div style={{fontSize:12,color:a.textColor,lineHeight:1.6,opacity:0.9}}>{a.text}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 🤖 AI総合レポート */}
      <div style={{background:"linear-gradient(135deg,#1e1b4b 0%,#312e81 100%)",borderRadius:20,padding:16,marginBottom:14,color:"white",marginLeft:-16,marginRight:-16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>🤖 AI総合レポート</div>
            {insightsReport&&<div style={{fontSize:10,opacity:0.7}}>{insightsReport.period==='15'?'半月':'月次'} · {new Date(insightsReport.generatedAt).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}生成</div>}
          </div>

          </div>

      </div>


      {/* 💚 よかったこと */}
      <div style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontWeight:700,color:"#1e293b",fontSize:15}}>💚 よかったこと</div>
          <div style={{fontSize:11,color:"#94a3b8"}}>{periodLabel} · {daysWithPos}日記録</div>
        </div>
        {topPositive.length>0 ? (
          <div>
            {topPositive.map(([item,cnt],i)=>(
              <div key={item} style={{marginBottom:9}}>

// ─── Discovery Tab ────────────────────────────────────────────
function DiscoveryTab({ selfAnswers, setSelfAnswers, authToken }) {
  // ── 今日の問い: UTCの日付ベースで全員が同じ問いを見る ──────────────
  const todayQIdx = Math.floor(Date.now() / 86400000) % SELF_QUESTIONS.length;
  const todayQ    = SELF_QUESTIONS[todayQIdx];
  const alreadyAnswered = !!selfAnswers[todayQ.id];
  const answeredCount   = Object.keys(selfAnswers).length;

  const [ans, setAns]             = useState([]);
  const [stats, setStats]         = useState(null);
  const [statsLoading, setStatsL] = useState(false);
  const [showHistory, setShowHist]= useState(true);

  // 回答済みの場合は統計を自動ロード
  React.useEffect(()=>{
    if(alreadyAnswered && !stats && authToken) loadStats(todayQ.id);
  }, [todayQ.id]);

  const CAT = {
    health:    {bg:"#fef3c7",border:"#fbbf24",text:"#92400e",label:"体・健康"},
    emotion:   {bg:"#ffe4e6",border:"#fb7185",text:"#881337",label:"感情・思考"},
    lifestyle: {bg:"#d1fae5",border:"#34d399",text:"#065f46",label:"習慣"},
    values:    {bg:"#e0e7ff",border:"#818cf8",text:"#312e81",label:"価値観"},
    weather:   {bg:"#e0f2fe",border:"#38bdf8",text:"#0c4a6e",label:"気象感受性"},
  };

  const toggle = o => setAns(p => p.includes(o) ? p.filter(x=>x!==o) : [...p,o]);

  const loadStats = async (qid) => {
    setStatsL(true);
    const data = await api('getSelfQuestionStats',{questionId:qid},authToken);
    if(data?.stats) setStats(data.stats);
    setStatsL(false);
  };

  const submit = async () => {
    if(!todayQ || alreadyAnswered) return;
    const answer = todayQ.type==='choice' ? ans : ans[0]||null;
    if(!answer||(Array.isArray(answer)&&answer.length===0)) return;
    // ローカルに保存
    setSelfAnswers(p=>({...p,[todayQ.id]:{answer,answeredAt:new Date().toISOString()}}));
    setAns([]);
    // サーバーに送信 → 統計を取得
    if(authToken){
      setStatsL(true);
      const data = await api('submitSelfAnswer',{questionId:todayQ.id,answer},authToken);
      if(data?.stats) setStats(data.stats);
      setStatsL(false);
    }
  };

  // 統計バー表示コンポーネント
  const StatsView = ({qid, q, statsData}) => {
    if(!statsData) return statsLoading
      ?<div style={{textAlign:"center",padding:"12px 0",color:"#94a3b8",fontSize:13}}>集計中…</div>
      :null;
    const {total, distribution:dist} = statsData;
    const myAnswer = selfAnswers[qid]?.answer;
    const mySet = new Set(Array.isArray(myAnswer)?myAnswer:[myAnswer]);
    // 質問の選択肢順 → 残りは登場順
    const opts = (q?.opts||[]).filter(o=>dist[o]);
    const extra = Object.keys(dist).filter(o=>!(q?.opts||[]).includes(o));
    const allOpts = [...opts,...extra];
    const maxCnt = Math.max(...Object.values(dist),1);
    return(
      <div style={{marginTop:14}}>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:10,fontWeight:600}}>
          みんなの回答
        </div>
        {allOpts.map(opt=>{
          const cnt=dist[opt]||0;
          const pct=total>0?Math.round((cnt/total)*100):0;
          const isMe=mySet.has(opt);
          return(
            <div key={opt} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:isMe?"#6366f1":"#475569",fontWeight:isMe?700:400}}>
                  {isMe?"▶ ":""}{opt}
                </span>
                <span style={{fontSize:11,color:"#94a3b8"}}>{pct}%</span>
              </div>
              <div style={{background:"#f0f4ff",borderRadius:4,height:6}}>
                <div style={{width:`${pct}%`,height:"100%",borderRadius:4,
                  background:isMe?"#6366f1":"#c7d2fe",transition:"width 0.6s ease"}}/>
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  const catProgress = ['health','emotion','lifestyle','values','weather'].map(c=>({
    c, total:SELF_QUESTIONS.filter(q=>q.cat===c).length,
    done:SELF_QUESTIONS.filter(q=>q.cat===c&&selfAnswers[q.id]).length
  }));

  const history = SELF_QUESTIONS
    .filter(q=>selfAnswers[q.id])
    .sort((a,b)=>selfAnswers[b.id].answeredAt.localeCompare(selfAnswers[a.id].answeredAt));

  const cc = CAT[todayQ.cat];

  return (
    <div style={{padding:"16px 16px 8px"}}>
      <div style={{fontSize:24,fontWeight:800,color:"#1e293b",marginBottom:2,letterSpacing:-0.5}}>自分を知る</div>
      <div style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>{answeredCount}問回答済み · 全{SELF_QUESTIONS.length}問</div>

      {/* ── 今日の問い ───────────────────────────────────── */}
      <div className="fade-in" style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)",borderRadius:20,padding:20,marginBottom:16,color:"white",marginLeft:-16,marginRight:-16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:11,opacity:0.8,fontWeight:600}}>今日の問い</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <div style={{fontSize:10,background:"rgba(255,255,255,0.2)",padding:"2px 8px",borderRadius:8,fontWeight:600}}>{cc.label}</div>
            <div style={{fontSize:10,background:"rgba(255,255,255,0.15)",padding:"2px 8px",borderRadius:8,fontWeight:600,border:"1px solid rgba(255,255,255,0.4)"}}>
              {todayQ.type==='choice'?'複数選択':'1つ選択'}
            </div>
            {alreadyAnswered&&<div style={{fontSize:10,background:"rgba(255,255,255,0.3)",padding:"2px 8px",borderRadius:8,fontWeight:700}}>✅ 回答済み</div>}
          </div>
        </div>
        <div style={{fontSize:17,fontWeight:700,marginBottom:8,lineHeight:1.65}}>{todayQ.q}</div>
        {!alreadyAnswered&&(
          <div style={{fontSize:11,opacity:0.7,marginBottom:12,fontWeight:600}}>
            {todayQ.type==='choice'?'複数選択できます':todayQ.type==='yesno'?'どちらか選んでください':'1つ選んでください'}
          </div>
        )}

        {!alreadyAnswered&&(
          <>
            {(todayQ.type==='choice'||todayQ.type==='single')&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {todayQ.opts.map(o=>{
                  const sel=todayQ.type==='choice'?ans.includes(o):ans[0]===o;
                  return(<button key={o} onClick={()=>todayQ.type==='single'?setAns([o]):toggle(o)}
                    style={{padding:"8px 14px",borderRadius:20,background:sel?"white":"rgba(255,255,255,0.15)",
                      color:sel?"#6366f1":"white",border:"none",fontSize:13,cursor:"pointer",fontWeight:sel?700:400}}>{o}</button>);
                })}
              </div>
            )}
            {todayQ.type==='yesno'&&(
              <div style={{display:"flex",gap:10}}>
                {todayQ.opts.map(o=>(
                  <button key={o} onClick={()=>setAns([o])}
                    style={{flex:1,padding:"12px 0",borderRadius:14,
                      background:ans[0]===o?"white":"rgba(255,255,255,0.15)",
                      color:ans[0]===o?"#6366f1":"white",border:"none",fontSize:13,cursor:"pointer",fontWeight:ans[0]===o?700:400}}>{o}</button>
                ))}
              </div>
            )}
            {ans.length>0&&(
              <button onClick={submit} style={{marginTop:14,width:"100%",background:"white",color:"#6366f1",
                border:"none",borderRadius:12,padding:"13px 0",fontSize:15,fontWeight:800,cursor:"pointer"}}>
                回答する →
              </button>
            )}
          </>
        )}

        {/* 回答済み: みんなの統計を表示 */}
        {alreadyAnswered&&(
          <div style={{background:"rgba(255,255,255,0.1)",borderRadius:14,padding:"12px 14px",marginTop:4}}>
            <StatsView qid={todayQ.id} q={todayQ} statsData={stats}/>
          </div>
        )}
      </div>

      {/* ── カテゴリ別進捗 ────────────────────────────── */}
      <div style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:700,color:"#1e293b",fontSize:15,marginBottom:12}}>📊 カテゴリ別進捗</div>
        {catProgress.map(({c,total,done})=>{
          const cc=CAT[c];
          const pct=Math.round((done/total)*100);
          return(
            <div key={c} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{background:cc.bg,border:`1px solid ${cc.border}`,color:cc.text,
                  fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:8}}>{cc.label}</span>
                <span style={{fontSize:11,color:"#94a3b8"}}>{done}/{total}</span>
              </div>
              <div style={{background:"#f0f4ff",borderRadius:4,height:6}}>
                <div style={{width:`${pct}%`,height:"100%",background:cc.border,borderRadius:4,transition:"width 0.4s ease"}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── 過去の回答 ────────────────────────────────── */}
      {history.length>0&&(
        <div style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16,boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <button onClick={()=>setShowHist(p=>!p)}
            style={{background:"none",border:"none",width:"100%",textAlign:"left",display:"flex",
              justifyContent:"space-between",alignItems:"center",cursor:"pointer",padding:0,marginBottom:showHistory?14:0}}>
            <span style={{fontWeight:700,color:"#1e293b",fontSize:15}}>📝 過去の回答 <span style={{fontSize:11,color:"#94a3b8",fontWeight:400}}>{history.length}問</span></span>
            <span style={{color:"#94a3b8",fontSize:12}}>{showHistory?"閉じる ▲":"表示する ▼"}</span>
          </button>
          {showHistory&&history.map(q=>{
            const a=selfAnswers[q.id];
            const cc=CAT[q.cat];
            const isMulti=q.type==='choice';
            const answers=Array.isArray(a.answer)?a.answer:[a.answer];
            const date=new Date(a.answeredAt).toLocaleDateString("ja-JP",{month:"numeric",day:"numeric"});
            return(
              <div key={q.id} style={{background:"#f8fafc",borderRadius:14,padding:"12px 14px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",gap:5,alignItems:"center"}}>
                    <span style={{background:cc.bg,border:`1px solid ${cc.border}`,color:cc.text,
                      fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:8}}>{cc.label}</span>
                    <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:8,
                      background:isMulti?"#fef3c7":"#f0f9ff",
                      color:isMulti?"#92400e":"#0369a1",
                      border:isMulti?"1px solid #fbbf24":"1px solid #7dd3fc"}}>
                      {isMulti?"複数回答":"単一回答"}
                    </span>
                  </div>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{date}</span>
                </div>
                <div style={{fontSize:13,color:"#475569",marginBottom:8,lineHeight:1.5}}>{q.q}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {answers.map((ans,i)=>(
                    <span key={i} style={{fontSize:12,fontWeight:600,color:cc.text,background:cc.bg,
                      padding:"5px 10px",borderRadius:8,border:`1px solid ${cc.border}`,lineHeight:1.5}}>{ans}</span>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── PersonImage: 常に25歳の画像を使用 ─────────────────────
function PersonImage({ apparent, gender, prefix='images/', tall }) {
  const slot = getPersonImageSlot(apparent);
  if (!slot) return null;
  const g = gender === 'female' ? 'f' : 'm';
  const urls = [`${prefix}${g}25_${slot}-min.png`];
  return <PersonImageLoader urls={urls} tall={tall}/>;
}
function PersonImageLoader({ urls, tall }) {
  const [idx, setIdx] = useState(0);
  if (tall) {
    const s = {position:'absolute',bottom:0,left:0,width:'100%',height:'100%',objectFit:'contain',objectPosition:'center bottom'};
    if (idx >= urls.length) return <div style={{...s,display:'flex',alignItems:'flex-end',justifyContent:'center',fontSize:56}}>🧍</div>;
    return <img src={urls[idx]} style={s} onError={()=>setIdx(i=>i+1)} alt=""/>;
  }
  if (idx >= urls.length) return <div style={{height:120,width:60,display:'flex',alignItems:'flex-end',justifyContent:'center',fontSize:56,flexShrink:0}}>🧍</div>;
  return <img src={urls[idx]} style={{height:120,objectFit:'contain',flexShrink:0}} onError={()=>setIdx(i=>i+1)} alt=""/>;
}

// ─── Shared Components ────────────────────────────────────────
function Card({title,extra,action,children,style={}}) {
  return(<div style={{background:"white",borderRadius:20,padding:16,marginBottom:14,marginLeft:-16,marginRight:-16,...style}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontWeight:700,color:"#1e293b",fontSize:15}}>{title}</span>{extra}</div>{action}</div>{children}</div>);
}
function Btn({onClick,children}) {
  return <button onClick={onClick} style={{background:"#6366f1",color:"white",border:"none",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>{children}</button>;
}
function Toggle({on,onToggle}) {

<!-- PWA: Service Worker 登録 -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        // 新しいSWが待機中になったらユーザーに更新を促す
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              // アプリ側のupdateAvailableステートを使って通知（既存の更新通知UIと連携）
              window.dispatchEvent(new CustomEvent('sw-update-available'));
            }
          });
        });
      })
      .catch(err => console.warn('[SW] 登録失敗:', err));
  });
}
</script>
