// ─── API / Auth ──────────────────────────────────────────────
// ネイティブアプリ（Capacitor）では相対URLが使えないため絶対URLにフォールバック
const IS_NATIVE     = !!(window.Capacitor?.isNativePlatform?.());

const LOCAL_VERSION = "2"; // ★ api.php の APP_VERSION と合わせる
const FREE_MODE     = true;  // ★ 全面無料モード: trueの間は全ユーザーが全機能を無料で利用可能
const checkPremium  = (user) => FREE_MODE || user?.plan === 'premium'; // 全コンポーネント共通プレミアム判定
let authTokenRef = null; // App初期化後に設定されるグローバル参照

// 気象庁 bosai API: 都道府県名 → JIS都道府県コード（2桁）
const PREF_JMA_CODE = {

  '03':{name:'暴風特別警報',         sev:4}, '04':{name:'暴風雪特別警報',       sev:4},

  '14':{name:'暴風雪警報',           sev:3},
  '15':{name:'強風注意報',           sev:2}, '16':{name:'波浪注意報',           sev:2},

  '21':{name:'なだれ注意報',         sev:1}, '22':{name:'低温注意報',           sev:2},
  '23':{name:'霜注意報',             sev:1}, '24':{name:'着氷注意報',           sev:1},
  '25':{name:'着雪注意報',           sev:1}, '33':{name:'高潮注意報',           sev:2},
  '34':{name:'大雨注意報',           sev:2}, '35':{name:'洪水注意報',           sev:2},
  '36':{name:'大雪注意報',           sev:2}, '37':{name:'竜巻注意情報',         sev:3},
  '38':{name:'記録的短時間大雨情報', sev:3},
  '39':{name:'土砂災害警戒情報',     sev:3}, '40':{name:'熱中症警戒アラート',   sev:3},
};

async function api(action, body, token) {
  try {
    const tok = token || authTokenRef;
    const isGet = !body;
    const res = await fetch(`${API_URL}?action=${action}${isGet?'&_='+Date.now():''}`, {
      method:  isGet ? 'GET' : 'POST',
      headers: {
        ...(isGet ? {} : {'Content-Type':'application/json'}),
        ...(tok ? {'Authorization': `Bearer ${tok}`} : {}),
      },
      body: isGet ? undefined : JSON.stringify(body),
    });
    // 401: トークン期限切れ → ストレージをクリア（次回ロード時にログイン画面を表示）
    if (res.status === 401 && tok && action !== 'login' && action !== 'register') {
      localStorage.removeItem('bl_token');
      localStorage.removeItem('bl_user');
      authTokenRef = null;
    }
    const t = await res.text(); return t ? JSON.parse(t) : {ok:true};
  } catch { return null; }
}

      ["第6条（料金・プラン）","無料プランは無料で利用できます。有料プランの料金・内容は当社の判断により変更することがあります。変更はアプリ内または登録メールで事前にお知らせします。月途中の解約・プラン変更については返金しません。"],

function ResetPasswordScreen({ resetToken, onDone }) {
  const [pass,    setPass]    = React.useState('');
  const [pass2,   setPass2]   = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [done,    setDone]    = React.useState(false);
  const [error,   setError]   = React.useState(null);
  const inp = {width:'100%',boxSizing:'border-box',padding:'12px 14px',borderRadius:12,
    border:'1.5px solid #e0e7ff',fontSize:15,outline:'none',color:'#1e293b',background:'white'};
  const pwStrength = (p) => {
    if(!p) return null;
    const ok8 = p.length >= 8, okL = /[a-zA-Z]/.test(p), okN = /[0-9]/.test(p);
    if(ok8&&okL&&okN) return {level:3,msg:'強い',color:'#10b981'};
    if((ok8&&okL)||(ok8&&okN)) return {level:2,msg:'普通（英字と数字を両方含めてください）',color:'#f59e0b'};
    return {level:1,msg:'弱い（8文字以上、英字・数字を含めてください）',color:'#ef4444'};
  };
  const strength = pwStrength(pass);
  const submit = async() => {
    if(pass.length < 8){ setError('パスワードは8文字以上にしてください'); return; }
    if(!/[a-zA-Z]/.test(pass)){ setError('パスワードには英字（a-z / A-Z）を含めてください'); return; }
    if(!/[0-9]/.test(pass)){ setError('パスワードには数字（0-9）を含めてください'); return; }
    if(pass !== pass2){ setError('パスワードが一致しません'); return; }
    setLoading(true); setError(null);
    const r = await api('reset_password', {token: resetToken, password: pass});
    setLoading(false);
    if(r?.ok) setDone(true);
    else setError(r?.error||'エラーが発生しました。リンクが期限切れの可能性があります。');
  };
  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#f0f4ff 0%,#ede9fe 100%)',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:380,padding:'32px 24px'}}>
        <div style={{textAlign:'center',marginBottom:28}}>
          <div style={{fontSize:48}}>🔒</div>
          <div style={{fontSize:22,fontWeight:800,color:'#1e293b'}}>新しいパスワードを設定</div>
        </div>
        {done ? (
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:16}}>✅</div>
            <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:12,padding:'16px 20px',marginBottom:20,fontSize:14,color:'#15803d'}}>
              パスワードを更新しました！<br/>新しいパスワードでログインしてください。
            </div>
            <button onClick={onDone} style={{width:'100%',padding:'13px 0',borderRadius:12,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',border:'none',fontSize:15,fontWeight:700,cursor:'pointer'}}>
              ログイン画面へ
            </button>
          </div>
        ) : (
          <>
            {error&&<div style={{background:'#fff1f2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:13,color:'#e11d48'}}>⚠️ {error}</div>}
            <div style={{marginBottom:12}}>
              <label style={{fontSize:12,color:'#64748b',display:'block',marginBottom:4}}>新しいパスワード</label>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="8文字以上（英字+数字）" style={inp}/>
              {strength&&<div style={{fontSize:11,color:strength.color,marginTop:4}}>強度: {strength.msg}</div>}
            </div>
            <div style={{marginBottom:20}}>
              <label style={{fontSize:12,color:'#64748b',display:'block',marginBottom:4}}>パスワード（確認）</label>
              <input type="password" value={pass2} onChange={e=>setPass2(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="もう一度入力" style={inp}/>
              {pass2&&pass!==pass2&&<div style={{fontSize:11,color:'#ef4444',marginTop:4}}>パスワードが一致しません</div>}
            </div>
            <button onClick={submit} disabled={loading}
              style={{width:'100%',padding:'13px 0',borderRadius:12,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',border:'none',fontSize:15,fontWeight:700,cursor:'pointer',opacity:loading?0.7:1}}>
              {loading?'更新中...':'パスワードを更新する'}
            </button>
          </>
        )}
      </div>
    </div>
  );
}

// ─── 設定マージ（配列フィールドはカスタム項目を保護）───────────────
// サーバーやファイルから読み込んだ設定とローカル状態をマージする。
// 配列フィールドは「サーバー配列」を基準に、ローカル独自追加項目を保持する。
function mergeSettings(srv, localSettings) {
  const s = srv || {};
  const l = localSettings || {};
  const customFrom = (arr, defaults) => (arr||[]).filter(x => !(defaults||[]).includes(x));
  return {
    ...DEFAULT_SETTINGS,
    ...s,
    symptoms: [...new Set([
      ...(s.symptoms?.length ? s.symptoms : (l.symptoms||DEFAULT_SYMPTOMS)),
      ...customFrom(l.symptoms, DEFAULT_SYMPTOMS),
    ])],
    goodItems: [...new Set([
      ...(s.goodItems?.length ? s.goodItems : (l.goodItems||DEFAULT_GOOD_ITEMS)),
      ...customFrom(l.goodItems, DEFAULT_GOOD_ITEMS),
    ])],
    badDayReasons: [...new Set([
      ...(s.badDayReasons?.length ? s.badDayReasons : (l.badDayReasons||BAD_DAY_REASONS)),
      ...customFrom(l.badDayReasons, BAD_DAY_REASONS),
    ])],
    habitualReasons: [...new Set([...(s.habitualReasons||[]), ...(l.habitualReasons||[])])],
  };
}

// 1日の気温差・風速・気圧変化を勘案した服装提案
// params: { tempMin, tempMax, windSpeed, pressureChange, temperatureType }
const CLOTHING_LEVELS = [
  { max:  0, icon:"🧥", label:"極寒",   base:"ダウンコート＋防寒フル装備", img:"/images/f25_-00-min.png" },
  { max:  5, icon:"🧥", label:"真冬",   base:"厚手コート＋マフラー＋手袋",  img:"/images/f25_01-05-min.png" },
  { max: 10, icon:"🧣", label:"冬",     base:"コート＋マフラー必須",         img:"/images/f25_06-10-min.png" },
  { max: 15, icon:"🧤", label:"肌寒い", base:"ジャケット＋ニット",           img:"/images/f25_11-15-min.png" },
  { max: 20, icon:"👔", label:"涼しい", base:"長袖＋薄手アウター",           img:"/images/f25_16-20-min.png" },
  { max: 25, icon:"👕", label:"快適",   base:"長袖がちょうどよい",           img:"/images/f25_21-25-min.png" },
  { max: 30, icon:"🩱", label:"暖かい", base:"半袖OK・UV対策を",             img:"/images/f25_26-30-min.png" },
  { max: 35, icon:"🌞", label:"暑い",   base:"半袖＋帽子・水分補給",         img:"/images/f25_31-35-min.png" },
  { max: Infinity, icon:"🔥", label:"猛暑", base:"外出最小限・冷却グッズ必携", img:"/images/f25_35--min.png" },
];
const clothingSuggestion = ({ tempMin, tempMax, windSpeed, pressureChange, temperatureType, weatherCode }) => {
  if(tempMin==null && tempMax==null) return null;
  const tMin = tempMin ?? tempMax;
  const tMax = tempMax ?? tempMin;
  const shift = temperatureType==="cold_sensitive" ? 5 : temperatureType==="heat_sensitive" ? -5 : 0;
  // 朝の最低気温を基準に体感補正
  const base = tMin + shift;
  const baseIdx = CLOTHING_LEVELS.findIndex(l => base <= l.max);
  const safeBaseIdx = Math.max(0, Math.min(baseIdx, CLOTHING_LEVELS.length-1));

  // 風速による服装レベルシフト（10m/s≒-5℃, 15m/s≒-8℃）
  const isSnow = weatherCode != null && ((weatherCode >= 71 && weatherCode <= 77) || weatherCode === 85 || weatherCode === 86); // 雪・雪シャワー
  const isWet  = weatherCode != null && weatherCode >= 51; // 霧雨・雨・雪・嵐すべて含む
  let windShift = 0;
  if(windSpeed != null) {
    if(windSpeed >= 15) windShift = 2;       // 強風→2段階上
    else if(windSpeed >= 10) windShift = 1;  // 風あり→1段階上
  }
  // 雨・雪＋風7m/s以上でさらに1段階（濡れによる体感低下）
  const wetShift = (isWet && windSpeed != null && windSpeed >= 7) ? 1 : 0;

  const finalIdx = Math.max(0, Math.min(safeBaseIdx + windShift + wetShift, CLOTHING_LEVELS.length-1));
  const level = CLOTHING_LEVELS[finalIdx];

  // 追加アドバイスを組み立て
  const hints = [];
  const range = tMax - tMin;
  if(range >= 10) hints.push(`気温差${range.toFixed(0)}℃→脱ぎ着しやすい重ね着を`);
  else if(range >= 7) hints.push(`気温差あり→薄手の羽織り物を携帯`);
  if(windSpeed != null && windSpeed >= 10) hints.push(`風速${windSpeed.toFixed(0)}m/s→一枚多めに`);
  else if(windSpeed != null && windSpeed >= 7 && isWet) hints.push(`風あり`);
  if(isSnow && wetShift > 0) hints.push(`雪→防寒・防水を忘れずに`);
  else if(isWet && wetShift > 0) hints.push(`雨→防水を忘れずに`);
  // 気圧変化は服装と無関係→リスクピルの役割なのでここでは出さない
  // 風速もリスクピルで出すので服装からは外す
  const suggestion = hints.length > 0 ? `${level.base}（${hints.join('・')}）` : level.base;
  // タイル形式のヒント（具体的に何を持つか）
  const hintTiles = [];
  if(isSnow) {
    hintTiles.push({label:"防寒",val:"防水ブーツ推奨",icon:"⛄"});
  } else if(isWet) {
    // 雨の強さ + 風速で雨具を具体的に
    if(windSpeed != null && windSpeed >= 12) hintTiles.push({label:"雨具",val:"合羽推奨",icon:"🧥"});
    else if(weatherCode >= 61 && weatherCode <= 67) hintTiles.push({label:"雨具",val:"長傘必須",icon:"☂️"});
    else if(weatherCode >= 95) hintTiles.push({label:"雨具",val:"長傘＋雷注意",icon:"⛈️"});
    else hintTiles.push({label:"雨具",val:"折りたたみ傘",icon:"☔"});
  }
  if(range >= 10) hintTiles.push({label:"重ね着",val:"脱ぎ着しやすく",icon:"🧥"});
  else if(range >= 7) hintTiles.push({label:"重ね着",val:"薄手の羽織り",icon:"🧥"});
  return { ...level, suggestion, hints, hintTiles };
};

// 不快指数 THI (Temperature-Humidity Index) ── 日本式
// 式: THI = 0.81T + 0.01H(0.99T - 14.99) + 46.3
const calcTHI = (t, h) => {
  if(t==null||h==null) return null;
  return parseFloat((0.81*t + 0.01*h*(0.99*t - 14.99) + 46.3).toFixed(1));
};

const calcAge      = (bd) => { if(!bd) return null; const b=new Date(bd+"T00:00:00"), t=new Date(); let a=t.getFullYear()-b.getFullYear(); if(t.getMonth()<b.getMonth()||(t.getMonth()===b.getMonth()&&t.getDate()<b.getDate())) a--; return a>=0&&a<130?a:null; };
// 時刻文字列（"HH:MM"、最大"32:00"）→ 分数。不正値は-1
const parseT = t => { if(!t)return -1; const m=t.match(/^(\d{1,2}):(\d{2})$/); if(!m)return -1; const h=+m[1],mn=+m[2]; if(h>32||mn>59)return -1; return h*60+mn; };
// 32:00 → "翌08:00" のように表示用に変換
const displayT = t => { if(!t)return t; const m=t.match(/^(\d{1,2}):(\d{2})$/); if(!m)return t; const h=+m[1]; return h>=24?`翌${String(h-24).padStart(2,"0")}:${m[2]}`:t; };
// type="time"の値(HH:MM) + nextDayフラグ → 保存用文字列(例:"32:00")
const applyNextDay = (t,nd) => { if(!t)return t; const m=t.match(/^(\d{1,2}):(\d{2})$/); if(!m)return normT(t); return nd?`${String(+m[1]+24).padStart(2,"0")}:${m[2]}`:normT(t); };
// 保存済み時刻(例:"32:00") → type="time"用の値("08:00")

// 時間ブロックのバリデーション。エラーメッセージ or null
const validateBlock = (start, end, blocks, excludeIdx=-1) => {
  const s=parseT(start), e=parseT(end);
  if(s<0||e<0) return "形式が正しくありません（例: 9:00 / 26:30）";
  if(e<=s)     return "終了は開始より後にしてください（翌日なら26:00など）";
  for(let i=0;i<blocks.length;i++){
    if(i===excludeIdx)continue;
    const bs=parseT(blocks[i].start),be=parseT(blocks[i].end);
    if(s<be&&bs<e) return `「${blocks[i].start}〜${blocks[i].end}」と重複しています`;
  }
  return null;
};
// HH:MM を 0埋め正規化

const calcMins     = bs => (bs||[]).reduce((t,b)=>{ if(!b.start||!b.end)return t; const s=parseT(b.start),e=parseT(b.end),d=e-s; return t+(d>0?d:0); },0);
const fmtMins      = m => { if(!m)return"0時間"; const h=Math.floor(m/60),r=m%60; return r?`${h}時間${r}分`:`${h}時間`; };

// 郵便番号 → 住所・座標
// ① サーバーキャッシュ（認証不要）→ ② zipcloud フォールバック
async function lookupZip(zip) {
  const clean = zip.replace(/[^0-9]/g,"");
  if (clean.length!==7) return null;

  // ① api.php 経由（DBキャッシュ確認 → なければ zipcloud プロキシ）
  try {
    const res = await fetch(`${API_URL}?action=lookupZipCache&zip=${clean}`);
    if (res.ok) {
      const d = await res.json();
      if (d.ok && d.lat && d.lon) return { address: d.address, lat: d.lat, lon: d.lon };
    }
  } catch {}

  // ② 直接 zipcloud（フォールバック: オフライン時やAPIエラー時）
  try {
    const res = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${clean}`);
    const d = await res.json();
    if (d.results?.[0]) {
      const r=d.results[0];
      return { address:`${r.address1}${r.address2}${r.address3}`, lat:parseFloat(r.latitude), lon:parseFloat(r.longitude) };
    }
  } catch {}
  return null;
}

// ─── カレンダー相対カラー（自分の平均対比）─────────────────
// 戻り値: { bg, label }
// 中央値を計算（14日以上ある場合はIQR法で外れ値を除外してから算出）
function calcBaseline(logs) {
  const allMins = Object.values(logs)
    .map(l => calcMins(l.activeBlocks))
    .filter(m => m > 0)
    .sort((a,b) => a - b);
  const n = allMins.length;
  if (n === 0) return { baseline: null, filtered: [], total: 0 };

  let filtered = allMins;
  let outlierRemoved = false;
  if (n >= 14) {
    const q1 = allMins[Math.floor(n * 0.25)];
    const q3 = allMins[Math.floor(n * 0.75)];
    const iqr = q3 - q1;
    const lo = q1 - 1.5 * iqr, hi = q3 + 1.5 * iqr;
    const f = allMins.filter(v => v >= lo && v <= hi);
    if (f.length >= 3) { filtered = f; outlierRemoved = true; }
  }

  const m = filtered.length;
  const median = m % 2 === 1
    ? filtered[Math.floor(m / 2)]
    : (filtered[Math.floor(m/2) - 1] + filtered[Math.floor(m/2)]) / 2;

  return { baseline: median, filtered, total: n, outlierRemoved };
}

function relativeColor(ds, logs, settings, weatherHist) {
  const log = logs[ds];
  // 未記入 → グレー
  if (!log || (!log.activeBlocks?.length && !log.symptoms?.length && !log.badDayReasons?.length && !log.note))
    return { bg:"#e2e8f0", label:"未記入" };

  const mins        = calcMins(log.activeBlocks);
  const symCount    = (log.symptoms      || []).length;
  const posCount    = (log.positiveItems || []).length;
  const reasonCount = (log.badDayReasons || []).length;

  // ── 活動スコア (0〜4) ─────────────────────────────────────
  const { baseline } = calcBaseline(logs);
  let actScore;
  if (mins === 0) {
    actScore = 0;
  } else if (baseline) {
    const ratio = mins / baseline;
    actScore = ratio >= 1.3 ? 4 : ratio >= 0.9 ? 3 : ratio >= 0.5 ? 2 : 1;
  } else {
    actScore = mins >= 360 ? 4 : mins >= 180 ? 3 : mins >= 60 ? 2 : 1;
  }

  // ── 症状ペナルティ (0〜2) ────────────────────────────────
  const symPenalty = symCount === 0 ? 0 : symCount === 1 ? 0.5 : symCount <= 3 ? 1 : symCount <= 5 ? 1.5 : 2;

  // ── 心当たりペナルティ (0〜0.5) ──────────────────────────
  const reasonPenalty = reasonCount === 0 ? 0 : reasonCount <= 2 ? 0.2 : 0.5;

  // ── 生理周期ペナルティ (0〜0.5) ──────────────────────────
  let cyclePenalty = 0;
  if (settings?.menstrualCycle && settings?.menstrualLastStart) {
    const cycle = settings.menstrualLength || 28;
    const start = new Date(settings.menstrualLastStart + "T00:00:00");
    const date  = new Date(ds + "T00:00:00");
    const dayOfCycle = (((Math.round((date - start) / 86400000)) % cycle) + cycle) % cycle;
    if (dayOfCycle === 0)      cyclePenalty = 0.5;
    else if (dayOfCycle <= 4)  cyclePenalty = 0.3;
  }

  // ── よかったことボーナス（件数が多いほど大きく）─────────────
  const posBonus = posCount === 0 ? 0 : posCount <= 2 ? 0.3 : posCount <= 3 ? 0.5 : 0.7;

  // ── 完全無症状＋活動良好ボーナス ────────────────────────────
  // 症状も理由もなく中央値以上動けた = 本当に調子の良い日
  const cleanDayBonus = (symCount === 0 && reasonCount === 0 && actScore >= 3) ? 0.3 : 0;

  // ── 逆境ポジティブボーナス ────────────────────────────────
  // 症状があってもよかったことを2件以上記録できた = 辛い中でも前向き
  const adversityBonus = (symCount >= 1 && posCount >= 2) ? 0.2 : 0;

  // ── ノート記録ボーナス ───────────────────────────────────
  // 自分の状態を10文字以上言語化できた日
  const noteBonus = (log.note && log.note.trim().length >= 10) ? 0.1 : 0;

  // ── 連続活動ボーナス（3日連続で中央値の90%以上）────────────
  let streakBonus = 0;
  if (actScore >= 3 && baseline) {
    const l1 = logs[offsetDate(ds, -1)];
    const l2 = logs[offsetDate(ds, -2)];
    const m1 = l1 ? calcMins(l1.activeBlocks) : 0;
    const m2 = l2 ? calcMins(l2.activeBlocks) : 0;
    if (m1 / baseline >= 0.9 && m2 / baseline >= 0.9) streakBonus = 0.3;
  }

  // ── 気象ペナルティ & 悪環境克服ボーナス ────────────────────
  let weatherPenalty = 0;
  let effortBonus    = 0;
  const w     = weatherHist?.[ds];
  const wPrev = weatherHist?.[offsetDate(ds, -1)];
  if (w) {
    const pressureType    = settings?.pressureType    || 'none';
    const temperatureType = settings?.temperatureType || 'normal';

    // 気圧急降下ペナルティ
    const pressureDrop = (wPrev?.pressureAvg != null && w.pressureAvg != null)
      ? wPrev.pressureAvg - w.pressureAvg : 0;
    if (pressureDrop >= 6) {
      weatherPenalty += pressureType === 'severe' ? 0.8 : pressureType === 'mild' ? 0.4 : 0.2;
    } else if (pressureDrop >= 3) {
      weatherPenalty += pressureType === 'severe' ? 0.4 : pressureType === 'mild' ? 0.2 : 0;
    }

    // 気圧急上昇ペナルティ（上昇も自律神経を乱す）
    const pressureRise = -pressureDrop;
    if (pressureRise >= 6) {
      weatherPenalty += pressureType === 'severe' ? 0.4 : pressureType === 'mild' ? 0.2 : 0;
    }

    // 気圧絶対値が低いペナルティ（低気圧の中にいること自体が負担）
    if (w.pressureAvg != null && pressureType !== 'none') {
      if      (w.pressureAvg < 995)  weatherPenalty += pressureType === 'severe' ? 0.4 : 0.2;
      else if (w.pressureAvg < 1000) weatherPenalty += pressureType === 'severe' ? 0.2 : 0.1;
    }

    // 寒暖差ペナルティ
    const tempRange = (w.tempMax != null && w.tempMin != null) ? w.tempMax - w.tempMin : 0;
    if      (tempRange >= 15)                              weatherPenalty += 0.3;
    else if (tempRange >= 10 && temperatureType !== 'normal') weatherPenalty += 0.2;

    // 熱中症リスクペナルティ（猛暑日 or 真夏日＋高湿度）
    if (w.tempMax != null && w.humidityAvg != null) {
      if      (w.tempMax >= 35 && w.humidityAvg >= 70) weatherPenalty += 0.4;
      else if (w.tempMax >= 33 && w.humidityAvg >= 70) weatherPenalty += 0.2;
      else if (w.tempMax >= 35)                         weatherPenalty += 0.2;
    }

    // 悪天候ペナルティ（大雨・嵐: WMOコード65以上）
    if (w.weatherCode != null && w.weatherCode >= 65) weatherPenalty += 0.2;

    // PM2.5ペナルティ
    if (w.pm25 != null) weatherPenalty += w.pm25 > 35 ? 0.3 : w.pm25 > 25 ? 0.15 : 0;

    // 地磁気Kpペナルティ（磁気嵐は自律神経に影響）
    if (w.kp != null) {
      if      (w.kp >= 6) weatherPenalty += pressureType !== 'none' ? 0.3 : 0.1;
      else if (w.kp >= 4) weatherPenalty += pressureType === 'severe' ? 0.2 : pressureType === 'mild' ? 0.1 : 0;
    }

    // 花粉ペナルティ（シラカバ・イネ科）
    const maxPollen = Math.max(w.pollenBirch || 0, w.pollenGrass || 0);
    if      (maxPollen > 100) weatherPenalty += 0.2;
    else if (maxPollen > 50)  weatherPenalty += 0.1;

    // 黄砂ペナルティ
    if (w.dust != null) weatherPenalty += w.dust > 200 ? 0.2 : w.dust > 100 ? 0.1 : 0;

    // ペナルティ上限（気象だけで2段階以上落ちないよう）
    weatherPenalty = Math.min(weatherPenalty, 1.2);

    // 悪環境判定
    const weatherWasTough = pressureDrop >= 6 || pressureRise >= 6
                          || tempRange >= 10
                          || (w.tempMax >= 33 && (w.humidityAvg || 0) >= 70);

    // 悪環境なのに活動量が良かったボーナス
    if (weatherWasTough && actScore >= 3) {
      effortBonus += pressureType === 'severe' ? 0.5 : pressureType === 'mild' ? 0.3 : 0.2;
    }
    // 悪環境なのに無症状ボーナス（体が対応できていた証拠）
    if (weatherWasTough && symCount === 0) {
      effortBonus += 0.2;
    }
    // ボーナス上限
    effortBonus = Math.min(effortBonus, 0.7);
  }

  // ── 複合スコアで色決定 ───────────────────────────────────
  const score = actScore
    - symPenalty - reasonPenalty - cyclePenalty
    - weatherPenalty
    + posBonus + cleanDayBonus + adversityBonus + noteBonus + streakBonus + effortBonus;
  if (score < 0.5) return { bg:"#f87171", label:"動けなかった" };
  if (score < 1.5) return { bg:"#fb923c", label:"しんどかった" };
  if (score < 2.5) return { bg:"#fde68a", label:"少し動けた" };
  if (score < 3.5) return { bg:"#bef264", label:"まあまあ" };
  return               { bg:"#22c55e", label:"よかった" };
}

// 客観的な出来事をweatherHistから生成
function objectiveEvents(ds, weatherHist, settings) {
  const events = [];
  const w = weatherHist[ds];
  const wPrev = weatherHist[offsetDate(ds,-1)];

  if (w) {
    // 気温情報
    if (w.tempMax!=null && w.tempMin!=null) {
      const diff = w.tempMax - w.tempMin;
      events.push({ icon:"🌡️", text:`気温 ${w.tempMin.toFixed(0)}℃〜${w.tempMax.toFixed(0)}℃（差 ${diff.toFixed(0)}℃）`, warn: diff>10 });
    }
    // 気圧変化
    if (wPrev?.pressureAvg!=null && w.pressureAvg!=null) {
      const dp = w.pressureAvg - wPrev.pressureAvg;
      if (Math.abs(dp) >= 4) {
        const drop = dp < 0;
        events.push({ icon: drop?"📉":"📈", text:`気圧${drop?"急降下":"急上昇"} ${drop?"":"+"}${dp.toFixed(0)}hPa`, warn: Math.abs(dp)>=6 });
      }
    }
    if (w.pressureAvg!=null) events.push({ icon:"🔵", text:`気圧 ${w.pressureAvg.toFixed(0)} hPa`, warn:false });
  }

  // 生理周期
  if (settings.menstrualCycle && settings.menstrualLastStart) {
    const cycle = settings.menstrualLength || 28;
    const start = new Date(settings.menstrualLastStart+"T00:00:00");
    const target = new Date(ds+"T00:00:00");
    const daysSince = Math.round((target-start)/86400000);
    const cycleDay = ((daysSince % cycle) + cycle) % cycle;
    const daysUntilNext = cycle - cycleDay;
    if (cycleDay < 6) events.push({ icon:"🌸", text:`生理 ${cycleDay+1}日目`, warn: cycleDay<3 });
    else if (daysUntilNext <= 3) events.push({ icon:"🌸", text:`生理 ${daysUntilNext}日前`, warn: true });
    else if (cycleDay >= 12 && cycleDay <= 16) events.push({ icon:"🌸", text:`排卵期ごろ（${cycleDay+1}日目）`, warn: false });
  }

  return events;
}

// 生理フェーズ情報を返す（ホーム表示用）
function getMenstrualPhase(settings, dateStr) {
  if (!settings.menstrualCycle || !settings.menstrualLastStart) return null;
  const cycle = settings.menstrualLength || 28;
  const start = new Date(settings.menstrualLastStart+"T00:00:00");
  const target = new Date((dateStr||todayStr())+"T00:00:00");
  const daysSince = Math.round((target - start) / 86400000);
  const cycleDay = ((daysSince % cycle) + cycle) % cycle; // 0-indexed
  const d = cycleDay + 1; // 1-indexed
  const daysUntilNext = cycle - cycleDay;

  let phase, color, bg, icon, advice, symptoms;
  if (d <= 5) {
    phase="月経期"; icon="🌸"; color="#e11d48"; bg="#fff1f2";
    advice="体を温め、無理せず安静に。痛みがあれば横になって。";
    symptoms=["生理痛","腰痛","だるさ","頭痛","貧血感"];
  } else if (d <= Math.round(cycle*0.46)) {
    phase="卵胞期"; icon="🌱"; color="#059669"; bg="#f0fdf4";
    advice="エストロゲン上昇中。体が軽くなり、意欲が出やすい時期。";
    symptoms=["比較的安定","やる気が出る","肌の調子が良い"];
  } else if (d <= Math.round(cycle*0.57)) {
    phase="排卵期"; icon="✨"; color="#d97706"; bg="#fffbeb";
    advice="エネルギーのピーク。積極的に動ける時期。";
    symptoms=["軽い腹痛","おりもの変化","体温上昇"];
  } else {
    phase="黄体期"; icon="🌙"; color="#7c3aed"; bg="#f5f3ff";
    if (daysUntilNext <= 7) {
      advice=`あと${daysUntilNext}日で生理の予定。PMSに注意。`;
      symptoms=["むくみ","気分の落ち込み","イライラ","頭痛","食欲増加","眠気"];
    } else {
      advice="プロゲステロン優位。体の変化に合わせてゆっくり過ごして。";
      symptoms=["体が重い","眠い","便秘気味"];
    }
  }
  return { d, cycleDay, daysUntilNext, phase, color, bg, icon, advice, symptoms, cycle };
}

// ─── 同意フロー v3 ──────────────────────────────────────────
function ConsentFlowV3({ onComplete, authToken }) {
  const [step, setStep] = useState(0); // 0=年齢確認, 1=利用規約, 2=プライバシー, 3=データ活用
  const [birthY, setBY] = useState('');
  const [birthM, setBM] = useState('');
  const [birthD, setBD] = useState('');
  const [isMinor, setIsMinor] = useState(false);
  const [guardianEmail, setGE] = useState('');
  const [guardianSent, setGS] = useState(false);
  const [guardianStatus, setGSt] = useState(null); // 'pending'|'approved'|'expired'
  const [guardianLoading, setGL] = useState(false);
  const [guardianError, setGErr] = useState(null);
  const [termsScrolled, setTS] = useState(false);
  const [privacyScrolled, setPS] = useState(false);
  const [consentData, setCD] = useState({...DEFAULT_CONSENT_V3});

  const currentYear = new Date().getFullYear();
  const years = []; for(let y=currentYear;y>=currentYear-120;y--) years.push(y);
  const months = []; for(let m=1;m<=12;m++) months.push(m);
  const days = []; for(let d=1;d<=31;d++) days.push(d);

  const checkAge = () => {
    if(!birthY||!birthM||!birthD) return;
    const bd = new Date(+birthY, +birthM-1, +birthD);
    const now = new Date();
    let age = now.getFullYear()-bd.getFullYear();
    if(now.getMonth()<bd.getMonth()||(now.getMonth()===bd.getMonth()&&now.getDate()<bd.getDate())) age--;
    const bdStr = `${birthY}-${String(birthM).padStart(2,'0')}-${String(birthD).padStart(2,'0')}`;
    setCD(c=>({...c, birthdate:bdStr, is_minor:age<18}));
    if(age<18){ setIsMinor(true); }
    else { setIsMinor(false); setStep(1); }
  };

  const sendGuardianRequest = async() => {
    if(!guardianEmail) { setGErr('メールアドレスを入力してください'); return; }
    setGL(true); setGErr(null);
    const r = await api('request_guardian_consent', {guardian_email: guardianEmail}, authToken);
    setGL(false);
    if(r?.ok) { setGS(true); setGSt('pending'); }
    else setGErr(r?.error||'送信に失敗しました');
  };

  const checkGuardianStatus = async() => {
    const r = await api('check_guardian_consent', null, authToken);
    if(r?.status==='approved'){
      setGSt('approved');
      setCD(c=>({...c, guardian_approved_at: r.approved_at}));
      setTimeout(()=>setStep(1), 1000);
    } else if(r?.status==='expired') setGSt('expired');
  };

  // 保護者同意待ちのポーリング
  useEffect(()=>{
    if(!guardianSent||guardianStatus==='approved') return;
    const iv = setInterval(checkGuardianStatus, 5000);
    return ()=>clearInterval(iv);
  },[guardianSent, guardianStatus]);

  const handleTermsAgree = () => {
    setCD(c=>({...c, terms_agreed_at: new Date().toISOString()}));
    setStep(2);
  };
  const handlePrivacyAgree = () => {
    setCD(c=>({...c, privacy_agreed_at: new Date().toISOString()}));
    setStep(3);
  };
  const handleResearchAgree = (agreed) => {
    const final = {...consentData, research_data:agreed, third_party_data:agreed};
    if(!final.terms_agreed_at) final.terms_agreed_at = consentData.terms_agreed_at;
    if(!final.privacy_agreed_at) final.privacy_agreed_at = consentData.privacy_agreed_at;
    onComplete(final);
  };

  const wrap = {minHeight:'100vh',background:'linear-gradient(160deg,#f0f4ff 0%,#ede9fe 100%)',display:'flex',alignItems:'center',justifyContent:'center'};
  const card = {width:'100%',maxWidth:430,padding:'0 20px 40px',margin:'0 auto'};
  const btnPrimary = {width:'100%',padding:'16px 0',borderRadius:14,background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'white',border:'none',fontSize:16,fontWeight:700,cursor:'pointer',marginTop:12};
  const btnSecondary = {width:'100%',padding:'14px 0',borderRadius:14,background:'white',color:'#6366f1',border:'1.5px solid #e0e7ff',fontSize:15,fontWeight:600,cursor:'pointer',marginTop:8};
  const selectStyle = {width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid #e0e7ff',fontSize:15,outline:'none',color:'#1e293b',background:'white',boxSizing:'border-box'};

  // プログレスバー
  const ProgressBar = ({current}) => (
    <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:28,marginTop:20}}>
      {[0,1,2,3].map(i=>(
        <div key={i} style={{width:i===current?24:10,height:10,borderRadius:5,background:i<=current?'#6366f1':'#e0e7ff',transition:'all 0.3s'}}/>
      ))}
    </div>
  );

  // STEP 0: 年齢確認
  if(step===0) return (
    <div style={wrap}>
      <div style={card}>
        <ProgressBar current={0}/>
        <div style={{textAlign:'center',marginBottom:24}}>

          <div style={{fontSize:14,color:'#64748b',marginTop:8,lineHeight:1.6}}>サービスのご利用にあたり、生年月日をお知らせください</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'2fr 1.2fr 1fr',gap:8,marginBottom:20}}>

          <select value={birthM} onChange={e=>setBM(e.target.value)} style={selectStyle}>

            <option value="">日</option>

        </div>

        {isMinor && !guardianSent && (
          <div className="fade-in" style={{background:'#fff7ed',borderRadius:14,padding:'16px 18px',marginBottom:16,border:'1px solid #fed7aa'}}>
            <div style={{fontSize:14,fontWeight:700,color:'#9a3412',marginBottom:8}}>18歳未満のため保護者の同意が必要です</div>
            <div style={{fontSize:13,color:'#7c2d12',lineHeight:1.6,marginBottom:12}}>保護者の方のメールアドレスを入力してください。同意確認のメールを送信します。</div>
            {guardianError&&<div style={{background:'#fff1f2',border:'1px solid #fca5a5',borderRadius:10,padding:'8px 12px',marginBottom:10,fontSize:13,color:'#e11d48'}}>{guardianError}</div>}
            <input type="email" value={guardianEmail} onChange={e=>setGE(e.target.value)}

            <button onClick={sendGuardianRequest} disabled={guardianLoading}
              style={{...btnPrimary,marginTop:0,opacity:guardianLoading?0.7:1}}>
              {guardianLoading?'送信中...':'同意リクエストを送信'}
            </button>
          </div>
        )}

        {guardianSent && guardianStatus!=='approved' && (
          <div className="fade-in" style={{background:'#f0fdf4',borderRadius:14,padding:'16px 18px',marginBottom:16,border:'1px solid #86efac',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:8}}>📧</div>
            <div style={{fontSize:15,fontWeight:700,color:'#166534',marginBottom:8}}>保護者への確認メールを送信しました</div>
            <div style={{fontSize:13,color:'#15803d',lineHeight:1.6}}>
              <strong>{guardianEmail}</strong> に同意確認メールを送信しました。<br/>
              保護者の方がメール内のリンクをクリックすると自動的に次へ進みます。
            </div>
            {guardianStatus==='expired'&&(
              <div style={{marginTop:12,fontSize:13,color:'#dc2626'}}>有効期限が切れました。再度リクエストを送信してください。
                <button onClick={()=>{setGS(false);setGSt(null);}} style={{background:'none',border:'none',color:'#6366f1',fontSize:13,cursor:'pointer',textDecoration:'underline',marginLeft:8}}>再送信</button>
              </div>
            )}
            <div style={{marginTop:12,fontSize:12,color:'#94a3b8'}}>
              <div style={{display:'inline-block',width:14,height:14,border:'2px solid #94a3b8',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 1s linear infinite',verticalAlign:'middle',marginRight:6}}/>
              承認を待っています...（72時間有効）
            </div>
          </div>
        )}

        {guardianStatus==='approved' && (
          <div className="fade-in" style={{background:'#f0fdf4',borderRadius:14,padding:'16px 18px',marginBottom:16,border:'1px solid #86efac',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:8}}>🎉</div>
            <div style={{fontSize:15,fontWeight:700,color:'#166534'}}>保護者の同意が確認されました！</div>
          </div>
        )}

        {!isMinor && (
          <button onClick={checkAge} disabled={!birthY||!birthM||!birthD}
            style={{...btnPrimary,opacity:(!birthY||!birthM||!birthD)?0.5:1,cursor:(!birthY||!birthM||!birthD)?'default':'pointer'}}>
            次へ進む
          </button>
        )}
        {isMinor && !guardianSent && !guardianStatus && (
          <div style={{textAlign:'center',marginTop:12}}>
            <button onClick={()=>{setIsMinor(false);setBY('');setBM('');setBD('');}}
              style={{background:'none',border:'none',color:'#94a3b8',fontSize:12,cursor:'pointer'}}>← 生年月日を修正する</button>
          </div>
        )}
      </div>
    </div>
  );

  // STEP 1: 利用規約
  if(step===1) return (
    <div style={{minHeight:'100vh',background:'#f0f4ff',maxWidth:430,margin:'0 auto'}}>
      <ProgressBar current={1}/>
      <div style={{padding:'0 20px 40px'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:42,marginBottom:8}}>📜</div>

        <div onScroll={e=>{const el=e.target;if(el.scrollHeight-el.scrollTop<=el.clientHeight+40)setTS(true);}}
          style={{background:'white',borderRadius:16,padding:'18px 16px',maxHeight:'55vh',overflowY:'auto',marginBottom:16,border:'1px solid #e0e7ff',fontSize:13,color:'#475569',lineHeight:1.8}}>
          <div style={{fontSize:15,fontWeight:800,color:'#6366f1',marginBottom:14,borderBottom:'2px solid #e0e7ff',paddingBottom:8}}>BodyLog 利用規約</div>
          {[
