function AppInner() {
  const [tab, setTab]               = useState("home");
  const [logs, setLogs]             = useState(()=>load("bl_logs",{}));
  const [settings, setSettings]     = useState(()=>load("bl_settings",DEFAULT_SETTINGS));
  const [discovery, setDiscovery]   = useState(()=>load("bl_discovery",[]));
  const [selfAnswers, setSelfAnswers] = useState(()=>load("bl_self_answers",{}));
  const [profile, setProfile]       = useState(()=>load("bl_profile",DEFAULT_PROFILE));
  const [consent, setConsent]       = useState(()=>{ const c=load("bl_consent",DEFAULT_CONSENT); return {...c,collection:true}; });
  const [onboarded, setOnboarded]   = useState(()=>load("bl_onboarded",false));
  const [userId]                    = useState(()=>{ let id=load("bl_userid",null);if(!id){id=genUUID();save("bl_userid",id);}return id; });
  const [weather, setWeather]       = useState(null);
  const [weatherLoading, setWL]     = useState(true);
  const [weatherHist, setWH]        = useState(()=>load("bl_whist",{}));
  const [syncStatus, setSyncStatus] = useState(null);
  const [communityStats, setCS]     = useState(null);
  const [activeQ, setActiveQ]       = useState(null);
  const [importToast, setImportToast]     = useState(null);
  const [updateAvailable, setUpdateAvail] = useState(false);
  const [jmaWarnings,    setJmaWarn]     = useState([]);  // 気象庁警報・注意報
  // ─── 認証ステート ───
  const [currentUser, setUser]   = useState(()=>load('bl_user', null));
  const [authToken,  setToken]   = useState(()=>load('bl_token', null));
  const [authScreen, setAS]      = useState('login'); // 'login'|'register'|'forgot'|'reset'|'magic_link'
  const [authLoading, setAL]     = useState(false);
  const [authError,  setAE]      = useState(null);
  const [loginFailCount, setLFC] = useState(0);
  const [resetToken, setRT]      = useState(null);
  const [showImport, setSI]      = useState(false);
  // ─── 同意フローv3ステート ───
  const [consentV3, setConsentV3] = useState(()=>load('bl_consent_v3', null));
  const [showConsentFlow, setSCF] = useState(false);
  const [jitConsent, setJitConsent] = useState(null); // null|'medical_history'|'menstrual'
  const [jitCallback, setJitCallback] = useState(null);

  useEffect(()=>{ if(consentV3) save('bl_consent_v3', consentV3); },[consentV3]);
  useEffect(()=>{ save("bl_logs",logs); },[logs]);
  useEffect(()=>{ save("bl_settings",settings); },[settings]);
  useEffect(()=>{ save("bl_discovery",discovery); },[discovery]);
  useEffect(()=>{ save("bl_self_answers",selfAnswers); },[selfAnswers]);
  useEffect(()=>{ save("bl_profile",profile); },[profile]);
  useEffect(()=>{ save("bl_consent",consent); },[consent]);
  useEffect(()=>{ save("bl_whist",weatherHist); },[weatherHist]);
  useEffect(()=>{ authTokenRef = authToken; },[authToken]);
  useEffect(()=>{ save('bl_user', currentUser); },[currentUser]);
  useEffect(()=>{ save('bl_token', authToken); },[authToken]);

  // ─── 設定・プロフィールの自動DB同期（debounce 2秒）───
  useEffect(()=>{
    if(!authToken) return;
    const t=setTimeout(()=>{
      api('saveSettings',{settings,profile,consent},authToken);
    },2000);
    return ()=>clearTimeout(t);
  },[settings,profile,consent,authToken]);

  // 天気・環境データ取得（郵便番号座標優先 → Geolocation → デフォルト）
  useEffect(()=>{
    const FALLBACK_LAT=35.6762, FALLBACK_LON=139.6503; // 東京（フォールバック）
    const fetchAll=(lat,lon,isRetry=false)=>{
      const today=todayStr();

      // ① メイン天気（気温・気圧・湿度・風・降水・UV・日照・視程・雲量）
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
        `&current=surface_pressure,temperature_2m,weather_code,apparent_temperature,relative_humidity_2m,wind_speed_10m,wind_direction_10m,precipitation,cloud_cover`+
        `&hourly=surface_pressure,temperature_2m,relative_humidity_2m,wind_speed_10m,wind_gusts_10m,uv_index,visibility,cloud_cover,precipitation`+
        `&daily=temperature_2m_max,temperature_2m_min,weather_code,surface_pressure_mean,wind_speed_10m_max,wind_gusts_10m_max,wind_direction_10m_dominant,precipitation_sum,rain_sum,snowfall_sum,precipitation_probability_max,uv_index_max,sunshine_duration`+
        `&timezone=auto&past_days=2&forecast_days=3`)
        .then(r=>r.json())
        .then(d=>{
          if(d.error && !isRetry){ fetchAll(FALLBACK_LAT,FALLBACK_LON,true); return; }
          setWeather(d); setWL(false);
          if(d.daily){
            const di=d.daily.time?d.daily.time.findIndex(t=>t===today):0;
            const i=di>=0?di:0;
            // 48h窓（前日12:00〜翌日12:00）の気温差・気圧差
            const ht=d.hourly?.time||[];
            const hp=d.hourly?.surface_pressure||[];
            const ht2=d.hourly?.temperature_2m||[];
            const prevNoon=offsetDate(today,-1)+"T12:00";
            const nextNoon=offsetDate(today,1)+"T12:00";
            const si48=ht.findIndex(t=>t===prevNoon);
            const ei48=ht.findIndex(t=>t===nextNoon);
            let tempDiff48h=null, pressureDiff48h=null;
            if(si48>=0 && ei48>si48){
              const temps=ht2.slice(si48,ei48+1).filter(x=>x!=null);
              const pres=hp.slice(si48,ei48+1).filter(x=>x!=null);
              if(temps.length) tempDiff48h=parseFloat((Math.max(...temps)-Math.min(...temps)).toFixed(1));
              if(pres.length)  pressureDiff48h=parseFloat((Math.max(...pres)-Math.min(...pres)).toFixed(1));
            }
            // 今日24h分のhourlyスライスを取り出すヘルパー
            const siToday=ht.findIndex(t=>t.startsWith(today+"T"));
            const day24=(arr)=>siToday>=0?(arr||[]).slice(siToday,siToday+24).filter(x=>x!=null):[];
            const favg=(arr)=>arr.length?parseFloat((arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1)):null;
            const fmin=(arr)=>arr.length?parseFloat(Math.min(...arr).toFixed(1)):null;
            const fmax=(arr)=>arr.length?parseFloat(Math.max(...arr).toFixed(1)):null;

            const pSlice  = day24(d.hourly?.surface_pressure);
            const huSlice = day24(d.hourly?.relative_humidity_2m);
            const wdSlice = day24(d.hourly?.wind_speed_10m);
            const visSlice= day24(d.hourly?.visibility);
            const cldSlice= day24(d.hourly?.cloud_cover);

            const todayWH = {
              // 気温
              tempMax:         d.daily.temperature_2m_max?.[i],
              tempMin:         d.daily.temperature_2m_min?.[i],
              tempDiff48h,
              // 気圧
              pressureAvg:     d.daily.surface_pressure_mean?.[i]||d.current?.surface_pressure,
              pressureMin:     fmin(pSlice),
              pressureMax:     fmax(pSlice),
              pressureDiff48h,
              // 湿度
              humidityAvg:     huSlice.length?Math.round(favg(huSlice)):null,
              humidityMin:     huSlice.length?Math.round(fmin(huSlice)):null,
              humidityMax:     huSlice.length?Math.round(fmax(huSlice)):null,
              // 天気コード
              weatherCode:     d.daily.weather_code?.[i],
              // 風（日次最大・突風・卓越風向 + 当日平均 + 現在値）
              windMax:         d.daily.wind_speed_10m_max?.[i],
              windGusts:       d.daily.wind_gusts_10m_max?.[i],
              windDirection:   d.daily.wind_direction_10m_dominant?.[i],
              windAvg:         favg(wdSlice),
              windCurrent:     d.current?.wind_speed_10m,
              windDirectionCurrent: d.current?.wind_direction_10m,
              // 降水（日合計・降水確率・現在値）
              precipSum:       d.daily.precipitation_sum?.[i],
              rainSum:         d.daily.rain_sum?.[i],
              snowfallSum:     d.daily.snowfall_sum?.[i],
              precipProbMax:   d.daily.precipitation_probability_max?.[i],
              precipCurrent:   d.current?.precipitation,
              // UV指数（日最大）
              uvIndexMax:      d.daily.uv_index_max?.[i],
              // 日照時間（時間換算）
              sunshineDuration: d.daily.sunshine_duration?.[i]!=null
                ?parseFloat((d.daily.sunshine_duration[i]/3600).toFixed(1)):null,
              // 視程（日平均 km）
              visibilityAvg:   visSlice.length?Math.round(favg(visSlice)/1000):null,
              // 雲量（日平均 % + 現在値）
              cloudCoverAvg:   cldSlice.length?Math.round(favg(cldSlice)):null,
              cloudCoverCurrent: d.current?.cloud_cover,
            };
            setWH(p=>({...p,[today]:{...p[today],...todayWH}}));
            // ── サーバー気象キャッシュに保存（郵便番号上3桁単位）
            if(authTokenRef && profile?.postalCode) {
              const zp=(profile.postalCode.replace(/[^0-9]/g,'')).substring(0,3);
              if(zp.length===3) {
                api('saveWeatherCache',{
                  zip_prefix:zp, lat, lon, date:today,
                  temp:d.current?.temperature_2m,
                  ...todayWH,
                }, authTokenRef);
              }
            }
          }
        }).catch(()=>{
          if(!isRetry){ fetchAll(FALLBACK_LAT,FALLBACK_LON,true); }
          else { setWL(false); }
        });

      // ② PM2.5・PM10・黄砂・オゾン・二酸化窒素（Open-Meteo Air Quality）
      // ※ birch_pollen/grass_pollen はヨーロッパ限定のため除外
      fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=pm2_5,pm10,dust,ozone,nitrogen_dioxide&timezone=auto&past_days=1&forecast_days=1`)
        .then(r=>r.json())
        .then(aqd=>{
          const ht=aqd.hourly?.time||[];
          const si=ht.findIndex(t=>t.startsWith(today));
          if(si>=0){
            const sl=(arr,s,n)=>(arr||[]).slice(s,s+n).filter(x=>x!=null);
            const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
            const mx =arr=>arr.length?Math.max(...arr):null;
            const f1 =(v)=>v!=null?parseFloat(v.toFixed(1)):null;
            const pm25v  = avg(sl(aqd.hourly.pm2_5,           si,24));
            const pm10v  = avg(sl(aqd.hourly.pm10,            si,24));
            const dustv  = mx( sl(aqd.hourly.dust,            si,24));
            const ozonev = avg(sl(aqd.hourly.ozone,           si,24));
            const no2v   = avg(sl(aqd.hourly.nitrogen_dioxide,si,24));
            setWH(p=>({...p,[today]:{
              ...p[today],
              pm25:  f1(pm25v),
              pm10:  f1(pm10v),
              dust:  f1(dustv),
              ozone: f1(ozonev),
              no2:   f1(no2v),
            }}));
          }
        }).catch(()=>{});

      // ③ 地磁気Kpインデックス（NOAA）
      fetch('https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json')
        .then(r=>r.json())
        .then(kd=>{
          if(Array.isArray(kd)&&kd.length>1){
            // kd[0]はヘッダ行、kd[1..n]はデータ行 ["time_tag","Kp",...]
            const last=kd[kd.length-1];
            const kp=parseFloat(last[1]||0);
            if(!isNaN(kp)){
              setWH(p=>({...p,[today]:{...p[today],kp:parseFloat(kp.toFixed(1))}}));
            }
          }
        }).catch(()=>{});

      // ④ 気象庁 bosai 警報・注意報（発表中のものを全取得）
      // profile.address 先頭が都道府県名 → JIS2桁コード → {code}0000.json
      if(profile?.address){
        const prefEntry=Object.entries(PREF_JMA_CODE).find(([name])=>profile.address.startsWith(name));
        if(prefEntry){
          const jmaCode=prefEntry[1];
          fetch(`https://www.jma.go.jp/bosai/warning/data/warning/${jmaCode}0000.json`)
            .then(r=>r.json())
            .then(jd=>{
              const seen=new Set(); // 同種警報の重複排除
              const warns=[];
              // ユーザーの市区町村名を抽出（例: 神奈川県川崎市→川崎）
              const cityM=(profile?.address||'').match(/[^\s都道府県]+?[市区町村]/);
              const cityKey=cityM?cityM[0].replace(/[市区町村]$/,''):'';
              for(const at of (jd.areaTypes||[])){
                for(const area of (at.areas||[])){
                  // エリア名にユーザーの市区町村が含まれる場合のみ
                  const aName=area.name||'';
                  if(cityKey&&!aName.includes(cityKey)) continue;
                  for(const w of (area.warnings||[])){
                    if((w.status==='発表'||w.status==='継続')&&!seen.has(w.code)){
                      const info=JMA_WARN_CODE[w.code];
                      if(info){ seen.add(w.code); warns.push({code:w.code,name:info.name,sev:info.sev}); }
                    }
                  }
                }
              }
              // 重要度降順ソート
              warns.sort((a,b)=>b.sev-a.sev);
              setJmaWarn(warns);
            }).catch(()=>{});
        }
      }
    };

    // ── サーバーキャッシュ優先取得（cronが1時間毎に更新済み） ──
    const tryServerCache=async()=>{
      const zp=(profile?.postalCode||'').replace(/[^0-9]/g,'').substring(0,3);
      if(zp.length!==3) return false;
      try{
        const today=todayStr();
        const res=await fetch(`${API_URL}?action=getWeatherGrid&zip_prefix=${zp}&date=${today}&_=${Date.now()}`);
        if(!res.ok) return false;
        const d=await res.json();
        if(!d.cached||!d.data) return false;
        // 90分以上古いキャッシュはスキップ
        const updAt=new Date(d.updated_at.replace(' ','T')+'Z');
        const jstNow=new Date();
        // updated_atがJST想定なら直接比較
        const age=Date.now()-new Date(d.updated_at.replace(' ','T')).getTime();
        if(age>90*60*1000) return false;

        const data=d.data;
        const {_daily,_current,_hourlyPressure,_hourlyTemp,_hourlyTime,...todayWH}=data;

        // weatherHist 更新
        setWH(p=>({...p,[today]:{...p[today],...todayWH}}));

        // weather state 構築（alerts・天気カード表示用）
        if(_daily&&_current){
          setWeather({
            current:_current,
            daily:_daily,
            hourly:{
              surface_pressure:_hourlyPressure||[],
              temperature_2m:_hourlyTemp||[],
              time:_hourlyTime||[],
            },
          });
        }
        setWL(false);

        // JMA 警報もサーバーキャッシュから取得
        if(profile?.address){
          const prefEntry=Object.entries(PREF_JMA_CODE).find(([name])=>profile.address.startsWith(name));
          if(prefEntry){
            try{
              const jr=await fetch(`${API_URL}?action=getJmaWarnings&pref=${prefEntry[1]}&_=${Date.now()}`);
              if(jr.ok){
                const jd=await jr.json();
                if(jd.cached&&Array.isArray(jd.warnings)){
                  const warns=jd.warnings.filter(w=>JMA_WARN_CODE[w.code]).map(w=>{
                    const info=JMA_WARN_CODE[w.code];
                    return{code:w.code,name:info.name,sev:info.sev};
                  }).sort((a,b)=>b.sev-a.sev);
                  setJmaWarn(warns);
                }
              }
            }catch{}
          }
        }

        console.log('[BodyLog] サーバーキャッシュ使用（API呼び出しスキップ）');
        return true;
      }catch{ return false; }
    };

    // 郵便番号設定済み → キャッシュ優先、なければAPIフォールバック
    if(profile.lat&&profile.lon){
      tryServerCache().then(hit=>{
        if(!hit) fetchAll(profile.lat,profile.lon);
      });
    }
    else if(navigator.geolocation) navigator.geolocation.getCurrentPosition(
      p=>fetchAll(p.coords.latitude,p.coords.longitude),
      ()=>fetchAll(FALLBACK_LAT,FALLBACK_LON),
      {timeout:5000, maximumAge:300000}  // 5秒でタイムアウト / 5分キャッシュ
    );
    else fetchAll(FALLBACK_LAT,FALLBACK_LON);
  },[profile.lat,profile.lon]);

  // バージョンチェック（起動時にサーバーと比較）
  useEffect(()=>{
    fetch(`${API_URL}?action=version&_=${Date.now()}`)
      .then(r=>r.json())
      .then(d=>{ if(d.version && d.version !== LOCAL_VERSION) setUpdateAvail(true); })
      .catch(()=>{});
  },[]);

  // Apple Healthショートカット URLパラメータからインポート
  // URL例: bodylog.html?steps=8000&sleep=7.5&hr=68&date=2026-03-12
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const steps=p.get("steps"),sleep=p.get("sleep"),hr=p.get("hr"),date=p.get("date")||todayStr();
    if(steps||sleep||hr){
      setLogs(prev=>{
        const ex=prev[date]||{activeBlocks:[],symptoms:[],note:"",badDayReasons:[]};
        return{...prev,[date]:{...ex,...(steps!=null?{steps:parseInt(steps)}:{}), ...(sleep!=null?{sleepHours:parseFloat(sleep)}:{}), ...(hr!=null?{bodyTemp:parseFloat(hr)}:{})}};
      });
      setImportToast(`📱 ヘルスケアデータを取り込みました（${date}）`);
      setTimeout(()=>setImportToast(null),4000);
      window.history.replaceState({},"",window.location.pathname);
    }
  },[]);

  // 週次アンケート
  useEffect(()=>{
    const last=discovery[discovery.length-1];
    const days=last?Math.floor((Date.now()-new Date(last.date))/86400000):999;
    if(days>=7) setActiveQ(DISCOVERY_QUESTIONS[discovery.length%DISCOVERY_QUESTIONS.length]);
  },[discovery]);

  // アラート（気象病メカニズムに基づく閾値）
  const alerts=[];
  const _today=todayStr();
  const _wHist=weatherHist[_today]||{};

  // ① 気圧変化（昨日→今日の24h平均差 = 今日の体調に影響するもの）
  if(weather?.hourly?.surface_pressure && weather?.hourly?.time){
    const hp=weather.hourly.surface_pressure, ht=weather.hourly.time;
    const si=ht.findIndex(t=>t.startsWith(_today+"T"));
    if(si>=0){
      const avg=arr=>{const v=arr.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;};
      const yesterdayAvg=avg(hp.slice(Math.max(0,si-24),si));
      const todayAvg=avg(hp.slice(si,si+24));
      if(yesterdayAvg!=null&&todayAvg!=null){
        const diff=todayAvg-yesterdayAvg;
        if(diff<=-10)    alerts.push({icon:"🚨",type:"red",   level:"【警告】気圧急降下",  msg:`昨日から気圧が${Math.abs(diff).toFixed(0)}hPa低下しています。頭痛・めまい・倦怠感が出やすい状態です。`});
        else if(diff<=-5)alerts.push({icon:"⚠️",type:"amber", level:"【注意】気圧低下",    msg:`昨日から気圧が${Math.abs(diff).toFixed(0)}hPa低下。頭痛・倦怠感が出やすい日です。`});
        else if(diff>=10) alerts.push({icon:"🚨",type:"red",  level:"【警告】気圧急上昇",  msg:`昨日から気圧が${diff.toFixed(0)}hPa上昇しています。急激な気圧上昇も自律神経に影響し、頭痛や倦怠感が出る場合があります。`});
        else if(diff>=5)  alerts.push({icon:"⚠️",type:"amber",level:"【注意】気圧上昇",    msg:`昨日から気圧が${diff.toFixed(0)}hPa上昇。気圧変動時は体調が変化しやすいです。`});
      }
    }
  }

  // ② 寒暖差（今日の日較差のみ）＋ 昨日→今日の最高気温変化
  if(weather?.daily?.temperature_2m_max){
    const dOff=weather.daily.time?weather.daily.time.findIndex(t=>t===_today):0;
    const off=dOff>=0?dOff:0;
    // 今日の日較差のみ
    const todayRange=(weather.daily.temperature_2m_max[off]??0)-(weather.daily.temperature_2m_min[off]??0);
    if(todayRange>=12)     alerts.push({icon:"🌡️",type:"red",   level:`【警告】寒暖差${todayRange.toFixed(0)}℃`,msg:`今日は寒暖差が非常に大きいです。自律神経への負担が高まり、だるさ・頭痛・寒暖差疲労が出やすくなります。`});
    else if(todayRange>=8) alerts.push({icon:"🌡️",type:"amber", level:`【注意】寒暖差${todayRange.toFixed(0)}℃`,msg:`今日は寒暖差が大きめです。体温調節にエネルギーを消耗しやすい日です。`});
    // 昨日→今日の最高気温変化（今日の体調に影響するもの）
    const yesterdayMax=weather.daily.temperature_2m_max[off-1];
    const todayMax=weather.daily.temperature_2m_max[off];
    if(yesterdayMax!=null&&todayMax!=null){
      const maxDiff=todayMax-yesterdayMax;
      if(maxDiff<=-5)      alerts.push({icon:"🥶",type:"amber",level:`【注意】昨日より${Math.abs(maxDiff).toFixed(0)}℃低下`,msg:`昨日の最高${yesterdayMax.toFixed(0)}℃から今日は${todayMax.toFixed(0)}℃へ。急な冷え込みで体に負担がかかりやすいです。`});
      else if(maxDiff>=5)  alerts.push({icon:"🥵",type:"amber",level:`【注意】昨日より${maxDiff.toFixed(0)}℃上昇`, msg:`昨日の最高${yesterdayMax.toFixed(0)}℃から今日は${todayMax.toFixed(0)}℃へ。急な気温上昇で体への負担が増す場合があります。`});
    }
  }

  // ③ 複合リスク（気圧降下＋寒暖差の同時発生）
  const hasPressWarn=alerts.some(a=>["amber","red"].includes(a.type)&&!a.icon.includes("🌡️")&&!a.icon.includes("🥶")&&!a.icon.includes("🥵"));
  const hasTempWarn=alerts.some(a=>a.icon==="🌡️");
  if(hasPressWarn&&hasTempWarn){
    alerts.unshift({icon:"🔴",type:"red",level:"【最大警戒】複合リスク",msg:`気圧の変化と大きな寒暖差が同時に発生しています。体への負担が重なりやすい組み合わせです。無理せず体調の変化に早めに気づくよう意識してください。`});
  }

  // ④ 強風リスク（リスクピルとして表示）
  if(weather?.daily?.wind_speed_10m_max){
    const dOff2=weather.daily.time?weather.daily.time.findIndex(t=>t===_today):0;
    const off2=dOff2>=0?dOff2:0;
    const tw=weather.daily.wind_speed_10m_max[off2];
    if(tw!=null&&tw>=15)      alerts.push({icon:"🌪️",type:"red",  level:"【警告】暴風 "+tw.toFixed(0)+"m/s",msg:`最大風速${tw.toFixed(0)}m/sの暴風予報。外出は危険を伴います。飛来物にも十分注意してください。`});
    else if(tw!=null&&tw>=10) alerts.push({icon:"💨",type:"amber",level:"【注意】強風 "+tw.toFixed(0)+"m/s",msg:`最大風速${tw.toFixed(0)}m/sの強風予報。傘が壊れやすい強さです。服装は風を通しにくいものを。`});
  }

  // ⑤ 気象庁警報・注意報を1枚にまとめて先頭に追加
  if(jmaWarnings.length>0){
    const maxSev=Math.max(...jmaWarnings.map(w=>w.sev));
    const type=maxSev>=4?'red':maxSev>=3?'orange':'amber';
    const icon=maxSev>=4?'🚨':maxSev>=3?'⚠️':'⚡';
    const warnings=jmaWarnings.map(w=>{
      const prefix=w.sev>=4?'【特別警報】':w.sev>=3?'【警報】':'【注意報】';
      return `${prefix}${w.name}`;
    }).join('　');
    alerts.unshift({icon,type,level:'気象庁 発表中',msg:`${warnings}\n外出・行動の前に最新情報を確認し、安全を確保してください。`,isJma:true});
  }
  // アラート上限：合計4件まで
  if(alerts.length>4) alerts.splice(4);

  const syncLog=async(date,logData)=>{
    const tok=authTokenRef||authToken;
    if(!tok) return;
    setSyncStatus("syncing");
    // その日の天気データをweatherHistから取得してログと一緒に保存
    const wh=weatherHist[date]||{};
    const weatherPayload=Object.keys(wh).length?{
      temp_min:       wh.tempMin          ?? null,
      temp_max:       wh.tempMax          ?? null,
      pressure_avg:   wh.pressureAvg      ?? null,
      pressure_min:   wh.pressureMin      ?? null,
      pressure_max:   wh.pressureMax      ?? null,
      pressure_diff:  wh.pressureDiff48h  ?? null,
      humidity_avg:   wh.humidityAvg      ?? null,
      humidity_min:   wh.humidityMin      ?? null,
      humidity_max:   wh.humidityMax      ?? null,
      temp_diff:      wh.tempDiff48h      ?? null,
      pm25:           wh.pm25             ?? null,
      dust:           wh.dust             ?? null,
      kp:             wh.kp               ?? null,
      description:    wh.description      ?? null,
    }:null;
    // ★ tokenを明示的に渡す（authTokenRefの初期化タイミング問題を回避）
    const ok=await api('saveLog',{log_date:date,active_minutes:calcMins(logData.activeBlocks),
      symptoms:logData.symptoms||[],menstrual_symptoms:logData.menstrualSymptoms||[],bad_day_reasons:logData.badDayReasons||[],
      positive_items:logData.positiveItems||[],
      note:logData.note||'',steps:logData.steps||null,sleep_hours:logData.sleepHours||null,
      body_temp:logData.bodyTemp||null,self_score:logData.self_score||null,active_blocks:logData.activeBlocks||[],
      ...(weatherPayload?{weather:weatherPayload}:{})}, tok);
    setSyncStatus(ok?.ok?"ok":"error");
    setTimeout(()=>setSyncStatus(null),3000);
  };
  const syncProfile=async(prof,con,newSett)=>{
    if(!authToken)return;
    await api('saveSettings',{settings:newSett||settings,profile:prof,consent:con});
  };
  const fetchCommunity=async()=>{ const d=await api('community'); if(d?.data)setCS(d.data); };

  const handleOnboard=(prof,con,sett)=>{
    setProfile(prof);
    setConsent(con);
    if(sett) setSettings(s=>({...DEFAULT_SETTINGS,...sett}));
    setOnboarded(true);
    save("bl_onboarded",true);
    syncProfile(prof,con,sett);
  };

  // ─── 認証: Google OAuth ───
  const handleGoogleStart=()=>{ window.location.href=`${API_URL}?action=google_start`; };

  // ─── 認証: サーバーからデータ読み込み ───
  const loadUserData=async(tok)=>{
    const [logsRes, settingsRes, selfRes] = await Promise.all([
      api('getLogs', null, tok),
      api('getSettings', null, tok),
      api('getUserSelfAnswers', null, tok),
    ]);
    // ★ APIが応答した場合のみ上書き（ネットワークエラー時はローカルデータを保持）
    if(logsRes !== null){
      const serverLogs = logsRes?.logs || {};
      setLogs(serverLogs);
      save('bl_logs', serverLogs);
    }
    if(settingsRes !== null && settingsRes?.settings) setSettings(s=>mergeSettings(settingsRes.settings, s));
    if(settingsRes !== null && settingsRes?.profile)  setProfile(p=>({...DEFAULT_PROFILE,...settingsRes.profile}));
    if(selfRes?.selfAnswers){
      const merged = {...load('bl_self_answers',{}), ...selfRes.selfAnswers};
      setSelfAnswers(merged);
      save('bl_self_answers', merged);
    }
  };

  // ─── マルチデバイス同期：サーバーデータとローカルをマージ ───
  // サーバー優先でマージ（サーバーにない日付のローカルデータは保持）
  const syncFromServer=async(tok, doPush=false)=>{
    if(!tok) return;
    // ① 【プッシュ】ローカルにのみあるデータをサーバーへ送信
    if(doPush){
      const localLogs=load('bl_logs',{});
      if(Object.keys(localLogs).length>0){
        await api('importLocalData',{logs:localLogs},tok);
      }
      // ローカルの selfAnswers をDBへ一括プッシュ（未ログイン時の回答を保護）
      // answeredAt も一緒に送り、回答日を正確に保持する
      const localSelf=load('bl_self_answers',{});
      const selfEntries=Object.entries(localSelf);
      if(selfEntries.length>0){
        await Promise.all(selfEntries.map(([qid,data])=>
          api('submitSelfAnswer',{questionId:qid,answer:data.answer,answeredAt:data.answeredAt},tok)
        ));
      }
    }
    // ② 【プル】サーバーから最新データを取得してローカルとマージ
    const [logsRes, settingsRes, selfRes] = await Promise.all([
      api('getLogs', null, tok),
      api('getSettings', null, tok),
      api('getUserSelfAnswers', null, tok),
    ]);
    if(logsRes !== null){
      const serverLogs = logsRes?.logs || {};
      const localLogs  = load('bl_logs', {});
      const merged = {...localLogs, ...serverLogs};
      setLogs(merged);
      save('bl_logs', merged);
    }
    if(settingsRes?.settings) setSettings(s=>mergeSettings(settingsRes.settings, s));
    if(settingsRes?.profile)  setProfile(p=>({...DEFAULT_PROFILE,...settingsRes.profile}));
    if(selfRes?.selfAnswers){
      const local = load('bl_self_answers', {});
      // サーバーデータを基準に、ローカルのansweredAt（ISO形式）を優先して上書き
      // 理由: バッチプッシュで日付が揃う場合があるため、ローカルの回答日を正として扱う
      const merged = {...selfRes.selfAnswers};
      Object.entries(local).forEach(([qid,loc])=>{
        if(merged[qid]){
          // ローカルのansweredAtが有効な日付なら優先（初回回答日を保持）
          const locAt=new Date(loc.answeredAt);
          merged[qid]={...merged[qid],answeredAt:!isNaN(locAt)?loc.answeredAt:merged[qid].answeredAt};
        }else{
          merged[qid]=loc;
        }
      });
      setSelfAnswers(merged);
      save('bl_self_answers', merged);
    }
  };

  // ① 起動時・ログイン後同期：プッシュ（ローカル→サーバー）＋プル（サーバー→ローカル）
  useEffect(()=>{
    if(authToken) syncFromServer(authToken, true); // doPush=true
  },[authToken]); // authToken変化時（ログイン後含む）に必ず実行

  // ② 画面復帰時同期：プルのみ（タブ/アプリを切り替えて戻ったとき）
  useEffect(()=>{
    if(!authToken) return;
    const onVisible=()=>{
      if(document.visibilityState==='visible') syncFromServer(authTokenRef, false); // doPush=false
    };
    document.addEventListener('visibilitychange', onVisible);
    return ()=>document.removeEventListener('visibilitychange', onVisible);
  },[authToken]);

  // ─── 認証: ログイン後の共通処理 ───
  const afterLogin=async(token, user, skipOnboarding=true)=>{
    setToken(token); setUser(user);
    authTokenRef=token;
    save('bl_token', token); save('bl_user', user);
    save('bl_prev_uid', user.id);
    // ★ 既存ユーザーのログインはオンボーディング完了として扱う
    // ★ 新規登録（skipOnboarding=false）はオンボーディングを表示する
    if(skipOnboarding){
      save('bl_onboarded', true);
      setOnboarded(true);
    }
    // ★ 常にローカルデータをサーバーへプッシュ（INSERT IGNORE）してからプル
    //    ユーザーID変更（再登録）時もローカルデータを失わないよう、クリア前に必ずプッシュ
    await syncFromServer(token, true);
  };

  // ─── 認証: ログイン ───
  const handleLogin=async(email,pass)=>{
    setAL(true); setAE(null);
    const r=await api('login',{email,password:pass});
    setAL(false);
    if(r?.token){ setLFC(0); await afterLogin(r.token, r.user); }
    else { setLFC(c=>c+1); setAE(r?.error||'ログインに失敗しました'); }
  };

  // ─── 認証: 新規登録 ───
  const handleRegister=async(name,email,pass,agreedAt)=>{
    setAL(true); setAE(null);
    const r=await api('register',{name,email,password:pass});
    setAL(false);
    if(r?.token){
      if(agreedAt) setConsent(c=>({...c,termsAgreedAt:agreedAt}));
      // 新規登録: まずログインしてからコンセントフローを表示
      setToken(r.token); setUser(r.user);
      authTokenRef=r.token;
      save('bl_token', r.token); save('bl_user', r.user);
      save('bl_prev_uid', r.user.id);
      setSCF(true); // 同意フローv3を表示
    } else setAE(r?.error||'登録に失敗しました');
  };

  // ─── 同意フローv3完了ハンドラー ───
  const handleConsentV3Complete = async(consentData) => {
    setConsentV3(consentData);
    save('bl_consent_v3', consentData);
    setSCF(false);
    // オンボーディングを表示（新規登録フロー継続）
    save('bl_onboarded', false);
    setOnboarded(false);
    await syncFromServer(authTokenRef, true);
  };

  // ─── 認証: ログアウト ───
  const handleLogout=()=>{
    // ★ ログアウト時は「最後のユーザーID」を記録するのみ。ログデータはクリアしない。
    // → ログイン時に同じユーザーか別ユーザーかを判定するために使う
    save('bl_prev_uid', currentUser?.id || null);
    setToken(null); setUser(null); authTokenRef=null;
    save('bl_token',null); save('bl_user',null);
    // ※ bl_logs は消さない（ネットワーク障害時にデータを失わないため）
    // ※ ログイン時に別ユーザーなら自動クリア、同一ユーザーならサーバーデータで上書き
  };

  // ─── ローカルデータをサーバーにインポート ───
  const handleImportLocal=async()=>{
    setSI(false);
    const localLogs=load('bl_logs',{});
    if(Object.keys(localLogs).length>0){
      await api('importLocalData',{logs:localLogs});
      setImportToast('📦 データをサーバーにインポートしました');
      setTimeout(()=>setImportToast(null),4000);
    }
    await loadUserData(authTokenRef); // stale closureを避けるためrefを使用
  };

  // ─── URL パラメータ処理（Google OAuth / パスワードリセット / マジックリンク）───
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const jwt=p.get('jwt');
    const authErr=p.get('auth_error');
    const rtok=p.get('reset_token');
    const mtok=p.get('magic_token');
    if(mtok){
      // マジックリンクを検証してログイン
      window.history.replaceState({},'',window.location.pathname);
      (async()=>{
        setAL(true); setAE(null);
        const r=await api('verify_magic_link',{token:mtok});
        setAL(false);
        if(r?.token){ await afterLogin(r.token, r.user); }
        else { setAE(r?.error||'ログインリンクが無効または期限切れです'); }
      })();
      return;
    }
    if(rtok){
      setRT(rtok); setAS('reset');
      // ログイン済みでもリセット画面を強制表示するためJWTをクリア
      setToken(null); save('bl_token',null); authTokenRef=null;
      window.history.replaceState({},'',window.location.pathname);
      return;
    }
    if(jwt){
      // ① まずJWTをすぐに保存してログイン画面を回避（検証は非同期で後から行う）
      authTokenRef = jwt;
      setToken(jwt);
      save('bl_token', jwt);
      (async()=>{
        const r=await api('get_user',null,jwt);
        if(r?.user){
          // afterLoginと同じ処理（Google OAuthの場合）
          save('bl_user', r.user);
          save('bl_prev_uid', r.user.id);
          setUser(r.user);
          // ★ 常にローカルデータをプッシュしてからプル（afterLoginと同じロジック）
          await syncFromServer(jwt, true);
        } else {
          // ② トークンが無効だった場合はクリア
          setToken(null); save('bl_token',null); authTokenRef=null;
          setAE('Googleログインに失敗しました。再度お試しください。');
        }
        window.history.replaceState({},'',window.location.pathname);
      })();
    } else if(authErr){
      // Google OAuthエラー
      const msgs={config:'Google認証の設定が完了していません','1':'認証コードが無効です','2':'トークンの取得に失敗しました','3':'メールアドレスを取得できませんでした'};
      setAE('Googleログインに失敗しました: '+(msgs[authErr]||'不明なエラー'));
      window.history.replaceState({},'',window.location.pathname);
    }
    // ?reset=1 → オンボーディングリセット（テスト用）
    if(p.get('reset')==='1'){
      localStorage.removeItem('bl_onboarded');
      setOnboarded(false);
      window.history.replaceState({},'',window.location.pathname);
    }
  },[]);

  const TABS=[{id:"home",label:"ホーム",icon:"🏠"},{id:"calendar",label:"カレンダー",icon:"📅"},{id:"insights",label:"インサイト",icon:"📊"},{id:"discovery",label:"発見",icon:"💡"},{id:"settings",label:"設定",icon:"⚙️"}];
  const [jumpDate, setJumpDate] = useState(null);
  const scrollRef = React.useRef(null);
  React.useEffect(()=>{ if(scrollRef.current) scrollRef.current.scrollTop=0; }, [tab]);
  const goEditDate = (ds) => { setJumpDate(ds); setTab("home"); };
  const shared={logs,setLogs,settings,setSettings,weather,weatherLoading,weatherHist,setWH,alerts,discovery,setDiscovery,activeQ,setActiveQ,selfAnswers,setSelfAnswers,syncLog,syncStatus,profile,setProfile,consent,setConsent,userId,communityStats,fetchCommunity,syncProfile,goEditDate,jumpDate,setJumpDate,currentUser,authToken,onLogout:handleLogout,consentV3,setConsentV3,setJitConsent,setJitCallback};

  // ─── 未ログイン → 認証画面 ───
  if(!authToken){
    if(authScreen==='register')
      return <RegisterScreen onRegister={handleRegister} onBack={()=>setAS('login')} loading={authLoading} error={authError}/>;
    if(authScreen==='forgot')
      return <ForgotPasswordScreen onBack={()=>setAS('login')}/>;
    if(authScreen==='reset')
      return <ResetPasswordScreen resetToken={resetToken} onDone={()=>{ setRT(null); setAS('login'); }}/>;
    if(authScreen==='magic_link')
      return <MagicLinkScreen onBack={()=>setAS('login')}/>;
    return <LoginScreen onLogin={handleLogin} onRegister={()=>setAS('register')} onGoogle={handleGoogleStart}
      onForgot={()=>setAS('forgot')} onMagicLink={()=>setAS('magic_link')} loading={authLoading} error={authError} failCount={loginFailCount}/>;
  }

  // ─── 同意フローv3（新規登録後） ───
  if(showConsentFlow) return <ConsentFlowV3 onComplete={handleConsentV3Complete} authToken={authToken}/>;

  if(!onboarded) return <Onboarding onComplete={handleOnboard} onLogout={handleLogout}/>;

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#f0f4ff",overflow:"hidden"}}>
      {/* ジャストインタイム同意ダイアログ */}
      {jitConsent&&<JitConsentDialog type={jitConsent}
        onAgree={()=>{
          const now=new Date().toISOString();
          if(jitConsent==='medical_history') setConsentV3(c=>({...(c||DEFAULT_CONSENT_V3), medical_history_agreed_at:now}));
          if(jitConsent==='menstrual') setConsentV3(c=>({...(c||DEFAULT_CONSENT_V3), menstrual_agreed_at:now}));
          setJitConsent(null);
          if(jitCallback) { jitCallback(true); setJitCallback(null); }
        }}
        onCancel={()=>{
          setJitConsent(null);
          if(jitCallback) { jitCallback(false); setJitCallback(null); }
        }}
      />}
      {showImport&&<ImportModal count={Object.keys(load('bl_logs',{})).length} onImport={handleImportLocal} onSkip={async()=>{ setSI(false); await loadUserData(authTokenRef); }}/>}
      <div ref={scrollRef} style={{flex:1,overflowY:"auto",paddingBottom:60}} className="fade-in">
        {tab==="home"      && <HomeTab {...shared}/>}
        {tab==="calendar"  && <CalendarTab {...shared}/>}
        {tab==="insights"  && <InsightsTab {...shared}/>}
        {tab==="discovery" && <DiscoveryTab {...shared}/>}
        {tab==="settings"  && <SettingsTab {...shared}/>}
      </div>

      {updateAvailable&&(
        <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",padding:"12px 16px",zIndex:300,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 2px 12px rgba(99,102,241,0.4)"}}>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>🆕 アップデートがあります</div>
            <div style={{fontSize:11,opacity:0.85,marginTop:2}}>タップして最新版に更新</div>
          </div>
          <button onClick={()=>window.location.reload(true)} style={{background:"white",color:"#6366f1",border:"none",borderRadius:20,padding:"8px 16px",fontSize:13,fontWeight:800,cursor:"pointer",flexShrink:0}}>更新する</button>
        </div>
      )}
      {importToast&&<div style={{position:"fixed",top:24,left:"50%",transform:"translateX(-50%)",background:"#1e293b",color:"white",padding:"10px 20px",borderRadius:24,fontSize:13,fontWeight:600,zIndex:200,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.25)",animation:"fadeIn 0.2s ease"}}>{importToast}</div>}
      <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",borderTop:"1px solid #e0e7ff",display:"flex",zIndex:100,paddingBottom:"calc(env(safe-area-inset-bottom) + 4px)"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);if(t.id==="insights")fetchCommunity();}} style={{flex:1,padding:"8px 4px 4px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t.id?"#6366f1":"#94a3b8",fontSize:10,fontWeight:tab===t.id?700:400}}>
            <span style={{fontSize:22,lineHeight:1}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

// ─── Onboarding ───────────────────────────────────────────────
function Onboarding({ onComplete, onLogout }) {
  const [step, setStep]     = useState(0);
  const [prof, setProf]     = useState(DEFAULT_PROFILE);
  const [sett, setSett]     = useState({...DEFAULT_SETTINGS});
  const [con,  setCon]      = useState({...DEFAULT_CONSENT, collection:true, thirdParty:true});
  const [showTerms, setShowTerms] = useState(false);
  const [zipMsg, setZipMsg] = useState("");
  const [toast, setToast]   = useState(false);
  const [touchStartX, setTSX] = useState(null);
  const [newSymptom,  setNS]  = useState("");
  const [newReason,   setNR]  = useState("");
  const [newGoodItem, setNG]  = useState("");
  const [jitType, setJitType] = useState(null); // 'menstrual'|'medical_history'

  const updP = p => setProf(prev=>({...prev,...p}));
  const updS = s => setSett(prev=>({...prev,...s}));
  const inp = { width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #e0e7ff", fontSize:15, outline:"none", color:"#1e293b", background:"white", boxSizing:"border-box" };
  const lbl = { fontSize:13, fontWeight:600, color:"#475569", marginBottom:6, display:"block" };

  const handleZip = async(val) => {
    updP({postalCode:val});
    const clean=val.replace(/[^0-9]/g,"");
    if(clean.length===7){ setZipMsg("検索中...");
      const res=await lookupZip(val);
      if(res){ updP({lat:res.lat,lon:res.lon,address:res.address}); setZipMsg(`✓ ${res.address}`); }
      else setZipMsg("住所が見つかりませんでした");
    } else { setZipMsg(""); updP({lat:null,lon:null,address:""}); }
  };

  const selBtn = (active) => ({
    flex:1, padding:"10px 6px", borderRadius:12, border:`1.5px solid ${active?"#6366f1":"#e0e7ff"}`,
    background:active?"#6366f1":"white", color:active?"white":"#64748b",
    fontSize:13, fontWeight:active?700:400, cursor:"pointer", textAlign:"center"
  });

  const toggleRow = (label, value, onChange, desc) => (
    <div style={{background:"white",borderRadius:14,padding:"14px 16px",marginBottom:10,border:`1.5px solid ${value?"#6366f1":"#e0e7ff"}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:"#1e293b"}}>{label}</div>
          {desc&&<div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{desc}</div>}
        </div>
        <div onClick={onChange} style={{width:44,height:24,borderRadius:12,background:value?"#6366f1":"#cbd5e1",cursor:"pointer",flexShrink:0,position:"relative",transition:"background 0.2s"}}>
          <div style={{position:"absolute",top:2,left:value?20:2,width:20,height:20,borderRadius:10,background:"white",transition:"left 0.2s"}}/>
        </div>
      </div>
    </div>
  );

  // スワイプ検出（イントロスライドのみ）
  const onTouchStart = e => setTSX(e.touches[0].clientX);
  const onTouchEnd   = e => {
    if(touchStartX===null) return;
    const diff = touchStartX - e.changedTouches[0].clientX;
    if(diff > 50 && step < 2) setStep(s=>Math.min(s+1,2));
    if(diff < -50 && step > 0) setStep(s=>Math.max(s-1,0));
    setTSX(null);
  };

  const handleSave = () => {
    setToast(true);
    setTimeout(()=>{ setToast(false); onComplete(prof,con,sett); }, 1400);
  };

  // ── イントロスライド ──────────────────────────────────
  const introSlides = [
    { icon:"📋", text:"このアプリは自分の体と心のクセを記録して分析できるアプリです" },
    { icon:"🤝", text:"伴奏してくれるAIと一緒に自分の体を知りましょう" },
  ];

  if(step < 2) return (
    <div
      style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#f0f4ff",maxWidth:430,margin:"0 auto",padding:"0 32px",userSelect:"none"}}
      onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      {showTerms&&<TermsModal
        onAgree={agreedAt=>{ setCon(p=>({...p,termsAgreedAt:agreedAt})); setShowTerms(false); setStep(2); }}
        onBack={()=>setShowTerms(false)}/>}
      <div className="fade-in" style={{textAlign:"center",width:"100%"}}>
        <div style={{fontSize:64,marginBottom:28}}>{introSlides[step].icon}</div>
        <div style={{fontSize:20,fontWeight:700,color:"#1e293b",lineHeight:1.7,marginBottom:40}}>
          {introSlides[step].text}
        </div>
      </div>
      {/* ドット */}
      <div style={{display:"flex",gap:8,marginBottom:40}}>
        {introSlides.map((_,i)=>(
          <div key={i} onClick={()=>setStep(i)} style={{width:i===step?20:8,height:8,borderRadius:4,background:i===step?"#6366f1":"#c7d2fe",cursor:"pointer",transition:"all 0.3s"}}/>
        ))}
      </div>
      <button onClick={step===0?()=>setStep(1):()=>setShowTerms(true)}
        style={{width:"100%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"white",border:"none",borderRadius:16,padding:"16px 0",fontSize:16,fontWeight:800,cursor:"pointer"}}>
        {step===0?"次へ →":"利用規約を確認して進む →"}
      </button>
      {onLogout&&(
        <div style={{marginTop:20,textAlign:"center"}}>
          <button onClick={onLogout} style={{background:"none",border:"none",color:"#94a3b8",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>
            別のアカウントでログイン
          </button>
        </div>
      )}
    </div>
  );

  // ── プロフィール入力フォーム ──────────────────────────
  return (
    <div style={{height:"100vh",overflowY:"auto",background:"#f0f4ff",maxWidth:430,margin:"0 auto"}}>
      {/* JIT同意ダイアログ */}
      {jitType&&<JitConsentDialog type={jitType}
        onAgree={()=>{
          if(jitType==='menstrual') updS({menstrualCycle:true});
          if(jitType==='medical_history') { /* 同意済み、入力を許可 */ }
          setJitType(null);
        }}
        onCancel={()=>setJitType(null)}
      />}
      {/* トースト */}
      {toast&&(
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#1e293b",color:"white",borderRadius:12,padding:"12px 24px",fontSize:14,fontWeight:600,zIndex:999,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"}}>
          プロフィールを保存しました！
        </div>
      )}

      <div style={{padding:"28px 20px 40px"}}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>STEP 3 / 3</div>
        <div style={{fontSize:22,fontWeight:800,color:"#1e293b",marginBottom:4}}>プロフィール一覧</div>
        <div style={{fontSize:13,color:"#94a3b8",marginBottom:24}}>まずはこちらの基礎情報を入力してください</div>

        {/* 👤 プロフィール */}
        <div style={{background:"white",borderRadius:16,padding:"16px",marginBottom:14,border:"1px solid #e0e7ff"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:14}}>👤 プロフィール</div>
          <div style={{marginBottom:14}}>
            <label style={lbl}>郵便番号 <span style={{fontWeight:400,color:"#94a3b8"}}>（気象データ取得に使用）</span></label>
            <input value={prof.postalCode} onChange={e=>handleZip(e.target.value)} placeholder="例: 1000001（ハイフンなし可）" maxLength={8} style={inp}/>
            {zipMsg&&<div style={{fontSize:12,marginTop:6,color:prof.address?"#059669":"#94a3b8"}}>{zipMsg}</div>}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div><label style={lbl}>生年月日</label><input type="date" value={prof.birthdate||""} onChange={e=>updP({birthdate:e.target.value})} max={todayStr()} style={inp}/></div>
            <div><label style={lbl}>体重（kg）</label><input type="number" value={prof.weight} onChange={e=>updP({weight:e.target.value})} placeholder="58.5" step="0.1" style={inp}/></div>
          </div>
          <div style={{marginBottom:14}}>
            <label style={lbl}>性別</label>
            <select value={prof.gender} onChange={e=>updP({gender:e.target.value})} style={inp}>
              <option value="">選択してください</option>
              <option value="male">男性</option>
              <option value="female">女性</option>
              <option value="other">その他</option>
              <option value="prefer_not_to_say">答えたくない</option>
            </select>
          </div>
          <div>
            <label style={lbl}>既往症・慢性疾患 <span style={{fontWeight:400,color:"#94a3b8"}}>（AIレポートの背景知識として使用。毎回言及はしません）</span></label>
            <textarea value={prof.existingConditions||""} onChange={e=>updP({existingConditions:e.target.value})}
              placeholder={"例: 線維筋痛症、慢性疲労症候群、自律神経失調症 など\n（任意・未入力でも問題ありません）"}
              rows={3}
              style={{...inp, resize:"vertical", lineHeight:1.6, fontFamily:"inherit"}}/>
          </div>
        </div>

        {/* 体の特性 */}
        <div style={{background:"white",borderRadius:16,padding:"16px",marginBottom:14,border:"1px solid #e0e7ff"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:14}}>体の特性</div>

          <div style={{marginBottom:14}}>
            <label style={lbl}>🌡️ 温度特性 <span style={{fontWeight:400,color:"#94a3b8"}}>（服装提案の調整）</span></label>
            <div style={{display:"flex",gap:8}}>
              {[["cold_sensitive","🥶 寒がり"],["normal","😊 ふつう"],["heat_sensitive","🥵 暑がり"]].map(([v,t])=>(
                <button key={v} onClick={()=>updP({temperatureType:v})} style={selBtn(prof.temperatureType===v)}>{t}</button>
              ))}
            </div>
          </div>

          <div style={{marginBottom:14}}>
            <label style={lbl}>🌀 気圧特性</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {[["low_sensitive","↓下がる時に弱い"],["high_sensitive","↑上がる時に弱い"],["none","どちらでもない"]].map(([v,t])=>(
                <button key={v} onClick={()=>updP({pressureType:v})} style={{...selBtn(prof.pressureType===v),flex:"none",padding:"10px 12px"}}>{t}</button>
              ))}
            </div>
          </div>

          {toggleRow("💧 湿度特性", prof.humidityType, ()=>updP({humidityType:!prof.humidityType}), "湿度が高い時に体が重くなりやすい")}
          {toggleRow("😴 睡眠習慣", prof.sleepShort, ()=>updP({sleepShort:!prof.sleepShort}), "平均睡眠時間が6時間未満")}
        </div>

        {/* 💚 よかったことの管理 */}
        <div style={{background:"white",borderRadius:16,padding:"16px",marginBottom:14,border:"1px solid #e0e7ff"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:4}}>💚 よかったことの管理</div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:10}}>記録に使う「よかったこと」を選んでください</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:10}}>
            {ALL_GOOD_ITEMS_CANDIDATES.map(g=>{
              const on=(sett.goodItems||DEFAULT_GOOD_ITEMS).includes(g);
              return (
                <button key={g} onClick={()=>{ const cur=sett.goodItems||DEFAULT_GOOD_ITEMS; updS({goodItems:on?cur.filter(x=>x!==g):[...cur,g]}); }}
                  style={{padding:"6px 12px",borderRadius:20,border:`1.5px solid ${on?"#10b981":"#d1fae5"}`,background:on?"#10b981":"#f0fdf4",color:on?"white":"#065f46",fontSize:12,fontWeight:on?700:400,cursor:"pointer"}}>
                  {g}
                </button>
              );
            })}
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={newGoodItem} onChange={e=>setNG(e.target.value)} placeholder="独自項目を追加..."
              style={{flex:1,padding:"8px 12px",borderRadius:10,border:"1.5px solid #d1fae5",fontSize:13,outline:"none"}}/>
            <button onClick={()=>{ const cur=sett.goodItems||DEFAULT_GOOD_ITEMS; if(newGoodItem.trim()&&!cur.includes(newGoodItem.trim())){ updS({goodItems:[...cur,newGoodItem.trim()]}); setNG(""); } }}
              style={{padding:"8px 14px",borderRadius:10,border:"none",background:"#10b981",color:"white",fontSize:12,fontWeight:700,cursor:"pointer"}}>追加</button>
          </div>
        </div>

        {/* 🩺 症状の管理 */}
        <div style={{background:"white",borderRadius:16,padding:"16px",marginBottom:14,border:"1px solid #e0e7ff"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:4}}>🩺 症状の管理</div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:10}}>記録に使う症状を選んでください（複数可）</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:10}}>

// ─── 5-day Forecast Chart (2 days past → 2 days future) ─────
function ForecastChart({ weather }) {
  if (!weather?.hourly?.time) return null;
  const now = new Date();
  const times = weather.hourly.time;
  // 一昨日0時〜明後日23時（5日分=120時間）
  const twoDaysAgo = localDate(new Date(now.getFullYear(), now.getMonth(), now.getDate()-2));
  const si = Math.max(0, times.findIndex(t => t.startsWith(twoDaysAgo+"T")));
  const N=120, W=340, H=140, pl=32, pr=6, pt=20, pb=16, iW=W-pl-pr, iH=H-pt-pb;
  const press = (weather.hourly.surface_pressure||[]).slice(si, si+N);
  const temp  = (weather.hourly.temperature_2m||[]).slice(si, si+N);
  const hum   = (weather.hourly.relative_humidity_2m||[]).slice(si, si+N);
  const thi   = temp.map((t,i)=>calcTHI(t, hum[i]));
  const slT   = times.slice(si, si+N);
  if (!press.length) return null;
  // 現在時刻のX位置（縦線用）
  const nowIdx = times.findIndex(t=>t>=`${localDate(now)}T${String(now.getHours()).padStart(2,"0")}`)-si;
  const nowX = nowIdx>=0 ? pl + nowIdx*(iW/Math.max(N-1,1)) : null;
  const xOf=i=>pl+i*(iW/Math.max(N-1,1));
  const stepW=iW/Math.max(N-1,1);

  // 【気温グラフ用】3時間ウィンドウの急変スポット ─ 共通バンドカラー使用
  const tempBands=[];
  for(let i=0;i<temp.length-3;i++){
    if(temp[i]==null||temp[i+3]==null) continue;
    const d=temp[i+3]-temp[i];
    if(d>=5)       tempBands.push({x:xOf(i), w:3*stepW, fill:BC.riseSharp}); // 急上昇
    else if(d>=3)  tempBands.push({x:xOf(i), w:3*stepW, fill:BC.rise});      // 上昇
    else if(d<=-5) tempBands.push({x:xOf(i), w:3*stepW, fill:BC.dropSharp}); // 急降下
    else if(d<=-3) tempBands.push({x:xOf(i), w:3*stepW, fill:BC.drop});      // 降下
  }

  // 【気圧グラフ用】6時間ウィンドウ ─ 共通バンドカラー使用
  const pressBands=[];
  for(let i=0;i<press.length-6;i++){
    if(press[i]==null||press[i+6]==null) continue;
    const d=press[i+6]-press[i];
    if(d<=-5)      pressBands.push({x:xOf(i), w:6*stepW, fill:BC.dropSharp}); // 急降下
    else if(d<=-3) pressBands.push({x:xOf(i), w:6*stepW, fill:BC.drop});      // 降下
    else if(d>=5)  pressBands.push({x:xOf(i), w:6*stepW, fill:BC.riseSharp}); // 急上昇
    else if(d>=3)  pressBands.push({x:xOf(i), w:6*stepW, fill:BC.rise});      // 上昇
  }

  const Chart = ({data, color, unit, label, bands=[], hBands=[]}) => {
    const mn=Math.floor(Math.min(...data))-1, mx=Math.ceil(Math.max(...data))+1;
    const yOf=v=>pt+iH-((v-mn)/(mx-mn||1))*iH;
    const pts=data.map((v,i)=>`${xOf(i)},${yOf(v)}`).join(" ");
    // 0時ごとに日付区切り線、6時間ごとに時刻ラベル（"6""12""18"の短い数字表示）
    const ticks=data.map((_,i)=>i).filter(i=>{
      const h=parseInt((slT[i]||"T0").split("T")[1]);
      return h%6===0;
    });
    return (
      <div style={{marginBottom:10}}>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:2}}>{label}</div>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
          {/* 横方向ゾーンバンド（値ベース・最背面） */}
          {hBands.map((b,bi)=>{
            const yTop=Math.max(pt,    yOf(Math.min(b.yMax, mx)));
            const yBot=Math.min(pt+iH, yOf(Math.max(b.yMin, mn)));
            const bh=Math.max(0, yBot-yTop);
            return bh>0?<rect key={`hb${bi}`} x={pl} y={yTop} width={iW} height={bh} fill={b.fill}/>:null;
          })}
          {/* 縦バンド（時間ベース） */}
          {bands.map((b,bi)=>(
            <rect key={`b${bi}`} x={b.x} y={pt} width={Math.max(b.w,0)} height={iH} fill={b.fill} rx={2}/>
          ))}
          {/* 水平グリッド */}
          {[0,.5,1].map(f=><line key={f} x1={pl} x2={W-pr} y1={pt+iH*f} y2={pt+iH*f} stroke="#f1f5f9" strokeWidth={0.8}/>)}
          {/* Y軸ラベル */}
          {[mn,(mn+mx)/2,mx].map((v,i)=>(
            <text key={i} x={pl-3} y={yOf(v)+3} textAnchor="end" fontSize={8} fill="#94a3b8">{v.toFixed(0)}</text>
          ))}
          {/* 日付区切り（0時に縦破線） + 欄外（上）に日付ラベル */}
          {data.map((_,i)=>{
            const h=parseInt((slT[i]||"T0").split("T")[1]);
            if(h!==0) return null;
            const x=xOf(i);
            const d=(slT[i]||"").substring(5,10).replace('-','/');
            return <g key={`d${i}`}>
              <line x1={x} x2={x} y1={pt} y2={pt+iH} stroke="#e0e7ff" strokeWidth={1} strokeDasharray="3,2"/>
              <text x={x+2} y={pt-5} fontSize={8.5} fill="#818cf8" fontWeight="700">{d}</text>
            </g>;
          })}
          {/* データ折れ線 */}
          <polyline points={pts} fill="none" stroke={color} strokeWidth={2.2} strokeLinejoin="round" strokeLinecap="round"/>
          {/* 現在時刻の縦線 */}
          {nowX!=null&&<line x1={nowX} x2={nowX} y1={pt} y2={pt+iH} stroke="#ef4444" strokeWidth={1.5} strokeDasharray="4,2"/>}
          {/* 時刻ラベル（"6""12""18" の短い数字のみ、0時は日付と重複するためスキップ） */}
          {ticks.map(i=>{
            const x=xOf(i);
            const h=parseInt((slT[i]||"T0").split("T")[1]);
            if(h===0) return null;
            return (
              <g key={i}>
                <line x1={x} x2={x} y1={pt+iH} y2={pt+iH+3} stroke="#cbd5e1" strokeWidth={0.8}/>
                <text x={x} y={H-2} textAnchor="middle" fontSize={8} fill="#94a3b8">{h}</text>
              </g>
            );
          })}
          <text x={W-pr-1} y={pt+9} textAnchor="end" fontSize={9} fill={color} fontWeight="bold">{unit}</text>
        </svg>
      </div>
    );
  };

  // 不快指数グラフ用：横方向ゾーン帯（値ベース）
  // ライン（折れ線）が青ゾーン＝寒い、橙・赤ゾーン＝暑い と直感でわかる
  const thiValid = thi.filter(v=>v!=null);
  const thiHBands = [
    {yMin:-Infinity, yMax:55, fill:"rgba(59,130,246,0.28)"},   // ～55  青（寒い）
    {yMin:55,        yMax:60, fill:"rgba(99,102,241,0.18)"},    // 55～60 青紫薄（肌寒い）
    // 60～75: 無色（快適ゾーン）
    {yMin:75,        yMax:85, fill:"rgba(249,115,22,0.20)"},    // 75～85 橙薄（暑い）
    {yMin:85,        yMax:Infinity, fill:"rgba(239,68,68,0.28)"},// 85～  赤（危険）
  ];

  return (
    <div style={{background:"white",borderRadius:20,marginBottom:14,marginLeft:-16,marginRight:-16,overflow:"hidden",boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px 8px"}}>
        <span style={{fontWeight:700,color:"#1e293b",fontSize:15}}>📈 気温・気圧・不快指数の推移</span>
        <span style={{fontSize:10,color:"#ef4444"}}>｜ = 現在</span>
      </div>
      <Chart data={temp}  color="#f97316" unit="℃"   label="気温（℃）"  bands={tempBands}/>
      <Chart data={press} color="#6366f1" unit="hPa" label="気圧（hPa）" bands={pressBands}/>
      {thiValid.length>0&&<Chart data={thi.map(v=>v??0)} color="#10b981" unit="THI" label="不快指数（THI）" hBands={thiHBands}/>}
      {/* 凡例：気温・気圧の縦バンドのみ（THIは直感でわかるため省略） */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:10,color:"#94a3b8",padding:"4px 16px 12px"}}>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:BC.rise,     marginRight:3,verticalAlign:"middle"}}/>上昇</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:BC.riseSharp,marginRight:3,verticalAlign:"middle"}}/>急上昇</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:BC.drop,     marginRight:3,verticalAlign:"middle"}}/>降下</span>
        <span><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:BC.dropSharp,marginRight:3,verticalAlign:"middle"}}/>急降下</span>
      </div>
    </div>
  );
}

  const [symSuggestOpen, setSymSuggestOpen] = useState(false);

  const isToday = editDate===todayStr();
  const habitualReasons = settings.habitualReasons||[];
  // その日のログがまだない場合は習慣的な心当たりをデフォルトで選択済みにする
  const log = logs[editDate]||{activeBlocks:[],symptoms:[],note:"",badDayReasons:[...habitualReasons]};

  const updS = p => setSettings(prev=>({...prev,...p}));

        <div>

        </div>
      </div>

      {/* 気象庁警報カード（独立表示 - 安全情報のため省略不可） */}
      {isToday&&(()=>{
        const S={
          red:   {bg:"#fff1f2",brd:"#ef4444",titleC:"#991b1b",textC:"#7f1d1d"},
          orange:{bg:"#fff7ed",brd:"#f97316",titleC:"#7c2d12",textC:"#78350f"},
          amber: {bg:"#fffbeb",brd:"#f59e0b",titleC:"#92400e",textC:"#78350f"},
        };
        const jmaAlert=alerts.find(a=>a.isJma&&!dismissedAlerts.has(a.level));
        if(!jmaAlert) return null;
        const s=S[jmaAlert.type]||S.amber;
        return(
          <div style={{background:s.bg,borderRadius:16,padding:"14px 16px",marginBottom:12,display:"flex",gap:12,alignItems:"flex-start",borderLeft:`5px solid ${s.brd}`,boxShadow:`0 2px 8px ${s.brd}22`,position:"relative",marginLeft:-16,marginRight:-16}}>
            <span style={{fontSize:28,flexShrink:0,lineHeight:1}}>{jmaAlert.icon}</span>
            <div style={{flex:1,paddingRight:24}}>
              <div style={{fontSize:13,fontWeight:800,color:s.titleC,marginBottom:4}}>{jmaAlert.level}</div>
              <div style={{fontSize:13,color:s.textC,lineHeight:1.65,whiteSpace:"pre-line"}}>{jmaAlert.msg}</div>
            </div>
            <button onClick={()=>setDismissedAlerts(prev=>new Set([...prev,jmaAlert.level]))} style={{position:"absolute",top:10,right:10,width:22,height:22,borderRadius:11,background:"rgba(0,0,0,0.08)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:s.titleC}}>×</button>
          </div>
        );
      })()}

      {isToday&&(()=>{
        const weatherRisks=alerts.filter(a=>!a.isJma&&!dismissedAlerts.has(a.level));
        const sevOrder=['red','orange','amber','info'];
        const topRiskType=weatherRisks.length>0?weatherRisks.reduce((t,a)=>sevOrder.indexOf(a.type)<sevOrder.indexOf(t)?a.type:t,'info'):'none';
        const riskAccent=topRiskType==='red'?'#ef4444':topRiskType==='orange'?'#f97316':topRiskType==='amber'?'#f59e0b':null;
        const pillBg={red:'rgba(239,68,68,0.9)',orange:'rgba(249,115,22,0.85)',amber:'rgba(245,158,11,0.8)',info:'rgba(59,130,246,0.7)'};
        return (
        <div style={{background:"linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%)",borderRadius:20,padding:0,marginBottom:14,color:"white",marginLeft:-16,marginRight:-16,overflow:"hidden",position:"relative"}}>
          {/* リスクアクセントバー（リスクがある場合のみ表示） */}
          {riskAccent&&<div style={{height:4,background:riskAccent,width:"100%"}}/>}
          <div style={{padding:"14px 18px 16px"}}>
          {weatherLoading?<div style={{textAlign:"center",opacity:0.8,padding:"12px 0"}}>気象データ取得中...</div>:(
            <>
              {/* リスクピルストリップ（アラートがある時のみ） */}
              {weatherRisks.length>0&&(
                <div style={{marginBottom:10}}>
                  {/* ピルグリッド（2〜3列、個数に応じて自動調整） */}

                      const isExp=expandedRisk===i;
                      const shortLabel=a.level.replace(/【[^】]+】/,'').trim();
                      return(
                        <div key={i} style={{background:isExp?'rgba(255,255,255,0.25)':(pillBg[a.type]||pillBg.info),borderRadius:12,padding:"5px 10px",display:"flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,border:isExp?"2px solid rgba(255,255,255,0.8)":"1px solid rgba(255,255,255,0.25)",cursor:"pointer"}} onClick={()=>setExpandedRisk(isExp?null:i)}>
                          <span style={{fontSize:13}}>{a.icon}</span>
                          <span style={{flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{shortLabel}</span>
                          <span style={{fontSize:9,opacity:0.7}}>{isExp?'▲':'▼'}</span>
                        </div>
                      );
                    })}
                  </div>
                  {/* 展開テキスト（グリッドの下に1つだけ表示） */}
                  {expandedRisk!=null&&weatherRisks[expandedRisk]&&(
                    <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"7px 11px",marginTop:6,fontSize:11,lineHeight:1.55,border:"1px solid rgba(255,255,255,0.12)"}}>
                      {weatherRisks[expandedRisk].msg}
                    </div>
                  )}
                </div>
              )}
              {/* 左（気象3行）＋ 右（画像） */}
              {(()=>{
                const dOff=weather?.daily?.time?weather.daily.time.findIndex(t=>t===todayStr()):0;
                const off=dOff>=0?dOff:0;
                const todayTempMin=weather?.daily?.temperature_2m_min?.[off];
                const todayTempMax=weather?.daily?.temperature_2m_max?.[off];
                const todayWind=weather?.daily?.wind_speed_10m_max?.[off];
                const todayWeatherCode=weather?.daily?.weather_code?.[off];
                const prevPressure=weather?.daily?.surface_pressure_mean?.[off-1];
                const todayPressure=weather?.daily?.surface_pressure_mean?.[off];
                const pressureChange=prevPressure!=null&&todayPressure!=null?todayPressure-prevPressure:null;
                const c=clothingSuggestion({tempMin:todayTempMin,tempMax:todayTempMax,windSpeed:todayWind,pressureChange,temperatureType:profile?.temperatureType,weatherCode:todayWeatherCode});
                const apparentRaw=weather?.current?.apparent_temperature;
                const tempShift=profile?.temperatureType==="cold_sensitive"?5:profile?.temperatureType==="heat_sensitive"?-5:0;
                const apparentAdj=apparentRaw!=null?apparentRaw+tempShift:null;
                const thi=calcTHI(weather?.current?.temperature_2m, weather?.current?.relative_humidity_2m);
                const thiI=thiInfo(thi);
                return <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
                  {/* 左: 気象3行 + 3日予報 */}
                  <div style={{flex:1}}>
                    {/* 行1: 気温・体感・天気 */}
                    <div style={{display:"flex",alignItems:"flex-start",gap:2,marginBottom:4}}>
                      <div style={{flex:1,textAlign:"center"}}>
                        <div style={{fontSize:10,opacity:0.75,marginBottom:2}}>現在の気象</div>
                        <div style={{fontSize:28,fontWeight:800,lineHeight:1}}>{weather?.current?`${weather.current.temperature_2m.toFixed(0)}℃`:"--℃"}</div>
                      </div>
                      <div style={{flex:1,textAlign:"center"}}>
                        <div style={{fontSize:10,opacity:0.75,marginBottom:2}}>体感温度</div>
                        <div style={{fontSize:28,fontWeight:800,lineHeight:1,opacity:0.85}}>{weather?.current?.apparent_temperature!=null?`${weather.current.apparent_temperature.toFixed(0)}℃`:"--℃"}</div>
                      </div>
                      <div style={{flex:1,textAlign:"center"}}>
                        <div style={{fontSize:10,opacity:0.75,marginBottom:2}}>天候</div>
                        <div style={{fontSize:36,lineHeight:1}}>{weather?.current?WMO_EMOJI(weather.current.weather_code):"🌤️"}</div>
                      </div>
                    </div>
                    {/* 行2: 気圧・湿度・不快指数（タイル風） */}
                    <div style={{display:"flex",gap:4,marginBottom:6}}>
                      {[
                        {label:"気圧",val:weather?.current?`${weather.current.surface_pressure.toFixed(0)}`:"-",unit:"hPa"},
                        {label:"湿度",val:weather?.current?.relative_humidity_2m!=null?`${weather.current.relative_humidity_2m}`:"-",unit:"%"},
                        thi!=null?{label:"不快指数",val:thiI.label,unit:""}:null,
                      ].filter(Boolean).map((t,i)=>(
                        <div key={i} style={{flex:1,background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"5px 4px",textAlign:"center"}}>
                          <div style={{fontSize:9,opacity:0.65,marginBottom:1}}>{t.label}</div>
                          <div style={{fontSize:t.unit?16:13,fontWeight:800,lineHeight:1.1,color:t.color||"inherit"}}>{t.val}{t.unit&&<span style={{fontSize:9,fontWeight:500,opacity:0.7,marginLeft:1}}>{t.unit}</span>}</div>
                        </div>
                      ))}
                    </div>
                    {/* 行3: 服装ベース + 具体ヒントタイル */}
                    {c&&<div style={{display:"flex",gap:4,alignItems:"stretch"}}>
                      <div style={{flex:1,background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"5px 8px",display:"flex",alignItems:"center",gap:5}}>
                        <span>👗</span>
                        <span style={{fontSize:11,fontWeight:600}}>{c.base}</span>
                      </div>
                      {(c.hintTiles||[]).map((t,i)=>(
                        <div key={i} style={{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"4px 8px",textAlign:"center",minWidth:64}}>
                          <div style={{fontSize:9,opacity:0.65,marginBottom:1}}>{t.label}</div>
                          <div style={{fontSize:11,fontWeight:700,lineHeight:1.2}}>{t.icon} {t.val}</div>

                    {/* 3日予報 */}
                    {weather?.daily?.weather_code&&(
                      <div style={{display:"flex",gap:6,marginTop:14,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.2)"}}>

                          <div key={i} style={{flex:1,textAlign:"center",fontSize:12}}>
                            <div style={{opacity:0.75}}>{label}</div>
                            <div style={{fontSize:22,margin:"4px 0"}}>{WMO_EMOJI(weather.daily.weather_code[off+i]||0)}</div>
                            <div style={{fontWeight:700}}>{weather.daily.temperature_2m_max?.[off+i]?.toFixed(0)}℃</div>
                            <div style={{opacity:0.65}}>{weather.daily.temperature_2m_min?.[off+i]?.toFixed(0)}℃</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  {/* 右: 人物画像 */}
                  <div style={{width:100,flexShrink:0,height:240,position:"relative"}}>
                    <PersonImage apparent={apparentAdj} gender={profile?.gender} age={calcAge(profile?.birthdate)??profile?.age} tall={true}/>
                  </div>
                </div>;
              })()}
            </>
          )}
          </div>
        </div>
        );
      })()}

      {isToday&&weather&&<ForecastChart weather={weather}/>}

      {/* 環境データカード（48h差分・花粉・PM2.5・黄砂・地磁気） */}
      {(()=>{
        const w=weatherHist?.[editDate]||{};
        const hasEnvData=w.tempDiff48h!=null||w.pressureDiff48h!=null||w.pm25!=null||w.pollenBirch!=null||w.dust!=null||w.kp!=null;
        if(!hasEnvData) return null;
        // カラーユーティリティ
        const col=(v,thLow,thHigh)=>v==null?"#94a3b8":v<thLow?"#10b981":v<thHigh?"#f59e0b":"#ef4444";
        const bg=(v,thLow,thHigh)=>v==null?"#f8fafc":v<thLow?"#f0fdf4":v<thHigh?"#fffbeb":"#fff1f2";
        const pollenLabel=(v)=>v==null?"--":v<10?"少":v<100?"中":"多";
        const kpLabel=(v)=>v==null?"--":v<3?"静穏":v<5?"乱れ":"嵐";
        const pm25Label=(v)=>v==null?"--":v<25?"良好":v<50?"注意":"悪化";
        const metrics=[
          w.tempDiff48h!=null   && {icon:"🌡️", label:"気温差",  val:`${w.tempDiff48h}℃`,   c:col(w.tempDiff48h,7,10),  b:bg(w.tempDiff48h,7,10)},
          w.pressureDiff48h!=null&&{icon:"🔵", label:"気圧差",  val:`${w.pressureDiff48h}hPa`,c:col(w.pressureDiff48h,6,10),b:bg(w.pressureDiff48h,6,10)},
          w.pm25!=null          && {icon:"💨", label:"PM2.5",      val:`${w.pm25}μg`,  sub:pm25Label(w.pm25),  c:col(w.pm25,25,50),  b:bg(w.pm25,25,50)},
          w.pollenBirch!=null   && {icon:"🌿", label:"花粉",        val:pollenLabel(w.pollenBirch), c:col(w.pollenBirch,10,100), b:bg(w.pollenBirch,10,100)},
          w.dust!=null          && {icon:"🏜️", label:"黄砂",        val:`${w.dust}μg`,  sub:w.dust<0.5?"少":w.dust<5?"中":"多", c:col(w.dust,0.5,5), b:bg(w.dust,0.5,5)},
          w.kp!=null            && {icon:"🧲", label:"地磁気Kp",    val:`${w.kp}`,       sub:kpLabel(w.kp),  c:col(w.kp,3,5),    b:bg(w.kp,3,5)},
        ].filter(Boolean);
        return (
          <Card title="📊 48時間の変化量">
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {metrics.map((m,i)=>(
                <div key={i} style={{background:m.b,borderRadius:14,padding:"12px 8px",textAlign:"center",border:`1px solid ${m.c}40`}}>
                  <div style={{fontSize:13,color:"#64748b",fontWeight:600,marginBottom:6,lineHeight:1.2}}>{m.label}</div>
                  <div style={{fontSize:26,marginBottom:4,lineHeight:1}}>{m.icon}</div>
                  <div style={{fontSize:20,fontWeight:800,color:m.c,lineHeight:1.2}}>{m.val}</div>
                  {m.sub&&<div style={{fontSize:13,color:m.c,fontWeight:700,marginTop:3}}>{m.sub}</div>}
                </div>
              ))}
            </div>
            <div style={{fontSize:10,color:"#94a3b8",marginTop:8}}>前日12時〜翌日12時の変動幅 / 花粉・地磁気は参考値</div>
          </Card>
        );
      })()}

      <Card title="🏃 からだのデータ" extra={<div style={{display:"inline-flex",alignItems:"center",gap:4,background:"#f1f5f9",borderRadius:8,padding:"3px 8px"}}><span style={{fontSize:10,color:"#94a3b8"}}>ヘルスケア：</span><span style={{fontSize:10,color:"#ef4444",fontWeight:700}}>未連携</span></div>}>
        <div style={{fontSize:10,color:"#94a3b8",marginBottom:8,textAlign:"center"}}>手入力OK — タップして数値を入力</div>
        <div style={{display:"flex",gap:8}}>
          {[
            {key:"steps",     label:"🚶 歩数",  unit:"歩",  color:"#10b981", bg:"#f0fdf4", type:"number", placeholder:"-", hint:"目安: 8,000"},
            {key:"sleepHours",label:"😴 睡眠",  unit:"時間",color:"#6366f1", bg:"#eff6ff", type:"number", placeholder:"-", hint:"目安: 7〜8h", step:"0.5"},
            {key:"bodyTemp",  label:"🌡️ 体温",  unit:"℃",  color:"#f97316", bg:"#fff7ed", type:"number", placeholder:"-", hint:"例: 36.5", step:"0.1"},

            const val = log[key];
            return (
              <div key={key} style={{flex:1,background:bg,borderRadius:14,padding:"12px 8px",textAlign:"center",cursor:"text"}} onClick={e=>{const inp=e.currentTarget.querySelector('input');if(inp)inp.focus();}}>

                  step={step||"1"} inputMode="decimal"
                  onChange={e=>{
                    const v=e.target.value;
                    upd({[key]: v===""?null : (key==="sleepHours"||key==="bodyTemp")?parseFloat(v):parseInt(v)});

                  style={{width:"100%",border:"none",background:"transparent",textAlign:"center",
                    fontSize:22,fontWeight:800,color:val!=null?color:"#cbd5e1",outline:"none",
                    fontFamily:"inherit",padding:0}}
                />
                <div style={{fontSize:10,color:val!=null?"#94a3b8":"#cbd5e1",marginTop:3}}>{val!=null?unit:hint}</div>
              </div>
            );
          })}
        </div>
      </Card>

      <Card title="動けた時間" extra={<span style={{fontSize:14,color:"#6366f1",fontWeight:700}}>{fmtMins(totalMins)}</span>} action={<Btn onClick={()=>setAB(p=>!p)}>＋ 追加</Btn>}>
        {(log.activeBlocks||[]).map((b,i)=>(
          editingIdx===i ? (
            <div key={i} style={{background:"#f8faff",borderRadius:12,padding:12,marginBottom:8,border:"1.5px solid #6366f1"}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>開始・終了時刻を選択</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 20px 1fr",gap:6,alignItems:"center",marginBottom:8}}>
                <div>
                  <div style={{fontSize:10,color:"#94a3b8",marginBottom:3,textAlign:"center"}}>開始</div>
                  <input type="time" step="900" value={toPickerVal(editBlock.start)} onChange={e=>{ setEB(p=>({...p,start:e.target.value})); setBE(null); }} style={{width:"100%",boxSizing:"border-box",padding:"10px 4px",borderRadius:10,border:`1.5px solid ${blockError?"#ef4444":"#e0e7ff"}`,fontSize:16,textAlign:"center",outline:"none",background:"white"}}/>
                </div>
                <div style={{textAlign:"center",color:"#94a3b8",fontWeight:700,paddingTop:16}}>〜</div>
                <div>
                  <div style={{fontSize:10,color:"#94a3b8",marginBottom:3,textAlign:"center"}}>終了</div>
                  <input type="time" step="900" value={toPickerVal(editBlock.end)} onChange={e=>{ setEB(p=>({...p,end:e.target.value})); setBE(null); }} style={{width:"100%",boxSizing:"border-box",padding:"10px 4px",borderRadius:10,border:`1.5px solid ${blockError?"#ef4444":"#e0e7ff"}`,fontSize:16,textAlign:"center",outline:"none",background:editBlock.nextDay?"#fef3c7":"white"}}/>
                  <button onClick={()=>setEB(p=>({...p,nextDay:!p.nextDay}))} style={{marginTop:5,width:"100%",padding:"5px 0",borderRadius:8,border:`1.5px solid ${editBlock.nextDay?"#f59e0b":"#e0e7ff"}`,background:editBlock.nextDay?"#fef3c7":"white",color:editBlock.nextDay?"#92400e":"#94a3b8",fontSize:12,fontWeight:editBlock.nextDay?700:400,cursor:"pointer"}}>
                    {editBlock.nextDay?"✓ 翌日":"翌日"}
                  </button>
                </div>
              </div>
              {blockError&&<div style={{fontSize:12,color:"#ef4444",marginBottom:8,lineHeight:1.4}}>⚠️ {blockError}</div>}
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{
                  const s=normT(editBlock.start), en=applyNextDay(editBlock.end, editBlock.nextDay);
                  const err=validateBlock(s,en,log.activeBlocks||[],i);
                  if(err){setBE(err);return;}
                  const a=[...(log.activeBlocks||[])];a[i]={start:s,end:en};
                  upd({activeBlocks:a});setEI(null);setEB(null);setBE(null);
                }} style={{flex:1,background:"#6366f1",color:"white",border:"none",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:700,cursor:"pointer"}}>保存</button>
                <button onClick={()=>{setEI(null);setEB(null);setBE(null);}} style={{flex:1,background:"#f0f4ff",color:"#6366f1",border:"none",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:700,cursor:"pointer"}}>キャンセル</button>
              </div>
            </div>
          ) : (
            <div key={i} onClick={()=>{setEI(i);setEB({start:toPickerVal(b.start),end:toPickerVal(b.end),nextDay:parseT(b.end)>=1440});setAB(false);}} style={{display:"flex",alignItems:"center",background:"#f0f4ff",borderRadius:10,padding:"9px 12px",marginBottom:8,gap:8,cursor:"pointer"}}>
              <span>🕐</span><span style={{flex:1,fontWeight:700,color:"#6366f1",fontSize:15}}>{displayT(b.start)} 〜 {displayT(b.end)}</span>
              <span style={{fontSize:12,color:"#94a3b8"}}>{fmtMins(calcMins([b]))}</span>
              <span style={{fontSize:11,color:"#a5b4fc"}}>✏️</span>
              <button onClick={e=>{e.stopPropagation();const a=[...(log.activeBlocks||[])];a.splice(i,1);upd({activeBlocks:a});}} style={{background:"none",border:"none",cursor:"pointer",color:"#cbd5e1",fontSize:18,lineHeight:1,padding:0}}>×</button>
            </div>
          )
        ))}
        {addingBlock&&(
          <div style={{background:"#f8faff",borderRadius:12,padding:12,border:"1.5px solid #e0e7ff"}}>
            <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>開始・終了時刻を選択</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 20px 1fr",gap:6,alignItems:"center",marginBottom:8}}>
              <div>
                <div style={{fontSize:10,color:"#94a3b8",marginBottom:3,textAlign:"center"}}>開始</div>
                <input type="time" step="900" value={newBlock.start} onChange={e=>{ setNB(p=>({...p,start:e.target.value})); setBE(null); }} style={{width:"100%",boxSizing:"border-box",padding:"10px 4px",borderRadius:10,border:`1.5px solid ${blockError?"#ef4444":"#e0e7ff"}`,fontSize:16,textAlign:"center",outline:"none",background:"white"}}/>
              </div>
              <div style={{textAlign:"center",color:"#94a3b8",fontWeight:700,paddingTop:16}}>〜</div>
